<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
    }

    .title {
      font-size: 60px;
      font-weight: bold;
      background: linear-gradient(to right, #00bfff, #ff00cc);
      -webkit-background-clip: text;
      color: transparent;
      margin-top: 30px;
      text-transform: uppercase;

    .support-box {
      position: relative;
      background: #111;
      border: 2px solid #25D366;
      border-radius: 12px;
display: inline-block;
      padding: 30px;
      margin-top: 30px;
      width: 90%;
      max-width: 400px;

    .support-box h2 {

      color: #25D366;
    }

    .support-box p {

    .join-btn {

      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .join-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 22px;
      color: #aaa;
      cursor: pointer;
    }

    .close-btn:hover {
      color: #fff;
    }

    @keyframes fadeIn {
