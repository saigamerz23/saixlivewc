<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            background-color: #050810; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
        }

        /* --- TOP WEBSITE HEADER --- */
        .site-header {
            padding: 20px 0;
            background: linear-gradient(to bottom, #0f172a, #050810);
            border-bottom: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .site-header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }
        .site-header span { color: #38bdf8; }
        
        /* Container */
        .player-container { 
            position: relative; 
            width: 96%; max-width: 900px; margin: 0 auto; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid #1e293b;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- PREMIUM WATERMARK (Overlays Source Watermark) --- */
        .watermark-cover {
            position: absolute;
            top: 15px; 
            left: 15px; 
            background: #000; /* Source logo chhupane ke liye solid black */
            padding: 6px 15px;
            font-size: 14px;
            font-weight: 800;
            color: #38bdf8;
            border-radius: 4px;
            z-index: 99999999; /* Isko sabse upar rakhega */
            pointer-events: none;
            display: none; /* Sirf play ke baad dikhega */
            border: 1px solid #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Fullscreen settings */
        .player-container:fullscreen .watermark-cover,
        .player-container:-webkit-full-screen .watermark-cover {
            display: block !important;
            top: 20px !important;
            left: 20px !important;
            font-size: 18px !important;
            padding: 10px 20px !important;
        }

        /* Start Overlay */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 13, 23, 0.95); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 16px 35px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .promo-btn:hover { transform: scale(1.05); background: #16a34a; }
    </style>
</head>
<body>

    <header class="site-header">
        <h1>CricketLIVE <span>Official</span></h1>
    </header>

    <div class="player-container" id="main-video-wrapper">
        <div id="cover" class="watermark-cover">CricketLIVE Official</div>

        <div id="my-overlay">
            <button class="promo-btn" onclick="hideOverlay()">WATCH LIVE MATCH</button>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        const wrapper = document.getElementById('main-video-wrapper');
        
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            document.getElementById('cover').style.display = 'block';
        }

        // Fullscreen Logic: Pure wrapper ko fullscreen karega taaki watermark saath rahe
        document.addEventListener('fullscreenchange', syncFS);
        document.addEventListener('webkitfullscreenchange', syncFS);

        function syncFS() {
            // Agar player fullscreen jane ki koshish kare, to wrapper ko bhej do
            if (document.fullscreenElement === player) {
                document.exitFullscreen();
                wrapper.requestFullscreen();
            }
        }
    </script>

</body>
</html>
