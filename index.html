<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
}

    body {
      font-family: 'Arial', sans-serif;
      background: #0b132b;
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
}

    #loadingScreen {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      text-align: center;
      color: #00f0ff;
      font-family: 'Orbitron', sans-serif;
}

    #loadingScreen::after {
      content: '...';
      animation: dots 1.5s infinite steps(3);
}

    @keyframes dots {
      0% { content: '';}
      33% { content: '.';}
      66% { content: '..';}
      100% { content: '...';}
}

    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      background: linear-gradient(90deg, #00f0ff, #ff00f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 20px;
      display: none;
      text-align: center;
}

    #supportBox {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 95%;
      max-width: 720px;
      background: #1c1c3c;
      border: 2px solid #25D366;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0, 255, 150, 0.4);
      animation: pop 0.5s ease;
}

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0;
}
      100% {
        transform: scale(1);
        opacity: 1;
}
}

    #supportBox h2 {
      margin-bottom: 10px;
      font-size: 1.8rem;
      color: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
}

    #supportBox h2 svg {
      width: 28px;
      height: 28px;
      fill: #25D366;
}

    #supportBox p {
      font-size: 1.1rem;
      margin-bottom: 20px;
}

.support-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
}

.support-buttons button {
      padding: 12px 28px;
      font-size: 1.1rem;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
}

.support-buttons button:hover {
      background: #128c7e;
}

.support-buttons button:disabled {
      background: #555;
      cursor: not-allowed;
}
  </style>
