<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a18;
      background-image: linear-gradient(rgba(5, 10, 24, 0.92), rgba(5, 10, 24, 0.92)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* 1. Loading Screen */
    #loadingScreen {
      position: fixed; inset: 0; background: #050a18;
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
    }
    .welcome-text { font-size: 1.2rem; color: #bf953f; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .loader-text { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #00ffff; letter-spacing: 5px; animation: pulseText 1.5s infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

    /* 2. Header */
    header {
      width: 92%; max-width: 420px; text-align: center; margin-top: 35px; padding: 18px 10px;
      background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
      border-radius: 15px; border: 1px solid rgba(191, 149, 63, 0.5); 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: none;
    }
    .header-text-content { font-family: 'Orbitron', sans-serif; font-size: 1.35rem; font-weight: 700; background: linear-gradient(90deg, #fff, #00ffff, #fff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
    @keyframes shine { to { background-position: 200% center; } }

    /* 3. Video Player */
    #playerContainer {
      width: 95%; max-width: 800px; margin-top: 25px; border-radius: 12px; overflow: hidden;
      border: 2px solid #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.2); display: none;
    }
    video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
    .status-bar { padding: 8px; font-size: 12px; text-align: center; background: #111; color: #00ffff; font-weight: 600; }

    /* 4. Support Box */
    #supportBox {
      display: none; width: 90%; max-width: 380px; background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px; padding: 25px; margin: 30px 0 100px 0; text-align: center;
    }
    .box-title { font-size: 1.5rem; color: #25D366; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .box-title img { width: 28px; }
    .join-btn { background: #25D366; color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 700; display: block; margin-top: 15px; }

    /* 5. Ticker Line */
    .premium-ticker-wrap { width: 100%; overflow: hidden; background: rgba(3, 7, 18, 0.95); position: fixed; bottom: 0; left: 0; z-index: 1000; border-top: 1px solid rgba(0, 255, 255, 0.3); padding: 10px 0; }
    .ticker-content { display: flex; white-space: nowrap; width: max-content; animation: scroll 25s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .ticker-item { display: flex; align-items: center; padding-right: 50px; color: #e2e8f0; font-size: 0.9rem; }
    .live-pill { background: rgba(255, 0, 0, 0.2); color: #ff4d4d; padding: 2px 8px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; margin-right: 15px; border: 1px solid #ff0000; }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="welcome-text">Welcome</div>
    <div class="loader-text">LOADING...</div>
  </div>

  <header id="headerBox">
    <div class="header-text-content">CRICKETLIVE! OFFICIAL</div>
  </header>

  <div id="playerContainer">
    <video id="video" controls autoplay playsinline poster="https://fancode.com/images/fancode-logo.png"></video>
    <div id="streamStatus" class="status-bar">SECURE CONNECTION ESTABLISHED</div>
  </div>

  <div id="supportBox">
    <div class="box-title"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"> Support Us!</div>
    <p style="font-size: 0.9rem;">Join our WhatsApp channel for Instant Updates & Links.</p>
    <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" class="join-btn" target="_blank">JOIN NOW</a>
    <button onclick="this.parentElement.style.display='none'" style="background:none; border:none; color:#777; margin-top:10px; cursor:pointer;">Close</button>
  </div>

  <div class="premium-ticker-wrap">
    <div class="ticker-content">
      <div class="ticker-item"><span class="live-pill">LIVE</span> Hey Cricket fans!  Join <span style="color:#f6d365; margin:0 5px;">CricketLIVE! Official</span> for instant updates! </div>
      <div class="ticker-item"><span class="live-pill">LIVE</span> Hey Cricket fans!  Join <span style="color:#f6d365; margin:0 5px;">CricketLIVE! Official</span> for instant updates! </div>
    </div>
  </div>

<script>
  // 1. Loading Logic
  setTimeout(() => {
    document.getElementById('loadingScreen').style.opacity = "0";
    setTimeout(() => {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('headerBox').style.display = 'block';
      document.getElementById('playerContainer').style.display = 'block';
      document.getElementById('supportBox').style.display = 'block';
      startPlayer(); // Video start
    }, 600);
  }, 3000);

  // 2. Player Logic
  function startPlayer() {
    var video = document.getElementById('video');
    var status = document.getElementById('streamStatus');
    
    //  YAHAN NAYA LINK DALEIN
    var rawUrl = 'https://in-mc-fdlive.fancode.com/mumbai/138924_english_hls_6196cf49e75704_1ta-di_h264/1080p.m3u8';
    
    var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rawUrl);

    if (Hls.isSupported()) {
      var hls = new Hls();
      hls.loadSource(proxyUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
        status.innerText = "STREAMING LIVE - HIGH QUALITY";
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          status.innerText = "LINK EXPIRED! PLEASE UPDATE URL";
          status.style.color = "red";
        }
      });
    }
  }
</script>

</body>
</html>
