<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .header { padding: 20px; font-size: 24px; font-weight: bold; color: #38bdf8; }
        .player-container { 
            width: 95%; max-width: 1000px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #334155; border-radius: 10px; overflow: hidden; 
        }
        iframe { width: 100%; height: 100%; border: none; }
        .info { margin-top: 20px; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container">
        <iframe id="main-player" 
                src="" 
                allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
                referrerpolicy="no-referrer"
                allowfullscreen></iframe>
    </div>

    <div class="info">
        <h3>Live Streaming Section</h3>
        <p id="msg">Loading stream...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // AGAR URL MEIN ID NAHI HAI, TOH YE 'zeefhd' AUTOMATIC CHALAYEGA
        const vid = params.get('id') || "zeefhd"; 
        
        const player = document.getElementById('main-player');
        const msgText = document.getElementById('msg');

        if (vid) {
            // MomixTV direct link format
            player.src = "https://momixtv.pages.dev/?id=" + vid;
            msgText.innerHTML = "Currently Playing: <b>" + vid + "</b>";
        }
    </script>

</body>
</html>
