<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricketLIVE! Official - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 40px; }
        .header { padding: 15px 10px; background: #0f172a; border-bottom: 2px solid #1e293b; }
        .header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 20px; margin: 0; }

        .video-wrapper { width: 95%; max-width: 850px; margin: 15px auto; background: #000; border: 2px solid #00d2ff; border-radius: 12px; overflow: hidden; position: relative; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; z-index: 1; }

        .channel-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px auto; max-width: 500px; }
        .channel-button { flex: 1 1 40%; background: linear-gradient(45deg, #f9a8d4, #ff0080); color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .jio-btn { background: linear-gradient(45deg, #00d2ff, #0072ff); }
        .active-btn { outline: 2px solid white; box-shadow: 0 0 10px #00d2ff; }
        
        .share-section { margin: 20px auto; max-width: 400px; }
        #shareInput { width: 80%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #00d2ff; text-align: center; margin-bottom: 10px; font-size: 12px; }
        .copy-btn { background: #00d2ff; color: #000; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .fs-button { background: #1e293b; color: #00d2ff; border: 1px solid #00d2ff; padding: 10px 20px; font-size: 12px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-bottom: 10px; }

        .info-box { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 20px; max-width: 420px; margin: 30px auto; padding: 25px; }
        .btn-wa { background: #25D366; color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; display: block; margin-bottom: 12px; }
        .btn-tg { background: #0088cc; color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; display: block; }
        
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 16, 0.98); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .pop-box { background: #111827; padding: 35px; border-radius: 25px; width: 85%; max-width: 320px; border: 2px solid #00d2ff; }
    </style>
</head>
<body onload="checkUrlParams()">

    <div id="entry-popup">
        <div class="pop-box">
            <h2 style="font-family:'Orbitron'; color:#00d2ff;">MATCH IS LIVE! </h2>
            <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="btn-wa" onclick="closePopup()">JOIN WHATSAPP</a>
            <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="btn-tg" onclick="closePopup()">JOIN TELEGRAM</a>
            <div style="margin-top:20px; cursor:pointer; font-size:12px; color:#64748b; text-decoration:underline;" onclick="closePopup()">CONTINUE TO STREAM</div>
        </div>
    </div>

    <header class="header">
        <h1>CricketLIVE! Official</h1>
    </header>

    <div class="video-wrapper" id="videoArea">
        <div class="video-container">
            <iframe id="livePlayer" src="" allow="autoplay; encrypted-media" allowfullscreen sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation"></iframe>
        </div>
    </div>
    
    <button class="fs-button" onclick="goFullScreen()">FULL SCREEN MODE</button>

    <div class="channel-grid">
        <button id="btn-sd" class="channel-button jio-btn" onclick="updatePlayer('sd')">Star Sports SD</button>
        <button id="btn-hd" class="channel-button" onclick="updatePlayer('hd')">Star Sports HD</button>
    </div>

    <div class="share-section">
        <p style="font-size: 13px; color: #f9a8d4;">Share this channel link:</p>
        <input type="text" id="shareInput" readonly>
        <br>
        <button class="copy-btn" onclick="copyLink()">COPY LINK & SHARE</button>
    </div>

    <div class="info-box">
        <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="btn-wa">WhatsApp Channel</a>
        <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="btn-tg">Telegram Channel</a>
    </div>

    <script>
        const links = {
            'sd': 'https://cinearena.github.io/id/sports.html?id=Star2eng',
            'hd': 'https://cinearena.github.io/id/sports.html?id=Star2engHD'
        };

        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const ch = params.get('ch');
            if (ch && links[ch]) {
                updatePlayer(ch);
            } else {
                updatePlayer('sd');
            }
        }

        function updatePlayer(type) {
            document.getElementById('livePlayer').src = links[type];
            
            // Highlight active button
            document.querySelectorAll('.channel-button').forEach(btn => btn.classList.remove('active-btn'));
            document.getElementById('btn-' + type).classList.add('active-btn');

            // Update URL without refresh
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?ch=' + type;
            window.history.pushState({path:newUrl},'',newUrl);
            document.getElementById('shareInput').value = newUrl;
        }

        function copyLink() {
            const copyText = document.getElementById("shareInput");
            copyText.select();
            document.execCommand("copy");
            alert("Channel Link Copied! Ab dosto ko bhej dein.");
        }

        function closePopup() { document.getElementById('entry-popup').style.display = 'none'; }
        
        function goFullScreen() {
            var el = document.getElementById('videoArea');
            if (el.requestFullscreen) { el.requestFullscreen(); } 
            else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); } 
        }
    </script>
</body>
</html>
