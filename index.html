<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    
    body {
      margin: 0;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      text-align: center;
      padding: 40px 0;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 72px;
      background: linear-gradient(90deg, #00ffff 0%, #7b00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 20px;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    .title img {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 3px #25D366);
    }

    .support-box {
      background: #111;
      border: 3px solid #25D366;
border-radius: 22px;
      display: inline-block;
      padding: 50px 60px;
      width: 90%;
      max-width: 650px;
      box-shadow: 0 0 35px #25D366bb;
      animation: slideIn 1.3s ease-out;
      font-size: 22px;
      line-height: 1.5;
      font-weight: 600;
      color: #e1e1e1;
      position: relative;
      user-select: none;
    }

    .support-box h2 {
      color: #25D366;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .support-box h2 img {
      width: 40px;
      height: 40px;
      animation: rotate 3s linear infinite;
    }

    .join-btn {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      padding: 18px 48px;
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: 0.4s ease;
      box-shadow: 0 0 15px #25D366aa;
      user-select: none;
    }

    .join-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px #25D366ee;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(40px);}
to { opacity: 1; transform: translateY(0);}
    }

    @keyframes rotate {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
  </style>
</head>
<body>

  <div class="title">
    CRICKETLIVE! OFFICIAL
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Logo" />
  </div>

  <div class="support-box">
    <h2>
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Logo" />
      Support Us!
    </h2>
    Join our WhatsApp channel <strong>CricketLIVE! Official</strong> for Instant Updates, Exclusive Match Links & More.
    <br /><br />
    <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="join-btn">Join Now</a>
  </div>

</body>
</html>
