<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .header { padding: 15px; font-size: 22px; font-weight: bold; color: #38bdf8; }
        
        .player-container { 
            position: relative; 
            width: 95%; max-width: 800px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #334155; border-radius: 10px; overflow: hidden; 
        }

        /* Iframe setup */
        iframe { width: 100%; height: 100%; border: none; }

        /* --- AAPKA POPUP (Jo hamesha upar rahega) --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2147483647; /* Maximum possible z-index */
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 12px 25px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 10px;
        }
        
        .close-text { font-size: 13px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container">
        <div id="my-overlay">
            <h2 style="margin-bottom:10px;">Watch Live Match</h2>
            <p style="font-size: 14px; color: #cbd5e1; margin-bottom: 20px;">Join WhatsApp for Direct Links</p>
            
            <button class="promo-btn" onclick="window.open('https://whatsapp.com/channel/AapkaLink', '_blank'); hideOverlay();">
                JOIN WHATSAPP & WATCH
            </button>
            
            <span class="close-text" onclick="hideOverlay()">Already Joined (Direct Watch)</span>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                referrerpolicy="no-referrer"
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');

        // Iframe load karein
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function hideOverlay() {
            // Jaise hi aapke button par click hoga, overlay hat jayega
            // MomixTV ka popup sandbox ki wajah se pehle hi block ho chuka hai
            document.getElementById('my-overlay').style.display = 'none';
        }
    </script>

</body>
</html>
