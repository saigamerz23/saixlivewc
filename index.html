<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CricketLIVE! Official</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .title {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(to right, #00bfff, #ff1493);
      -webkit-background-clip: text;
      color: transparent;
      margin: 20px 0 10px 0;
    }
    .whatsapp-btn {
      background-color: #25D366;
      color: white;
      padding: 10px 20px;
      border: none;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 20px;
      display: inline-block;
    }
    video {
      width: 100%;
      height: auto;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="title">CricketLIVE! Official</div>
<a class="whatsapp-btn" href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank">
    📲 Join WhatsApp Channel
  </a>

  <video id="video" controls autoplay></video>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const links = {
      "Star1HindiHD": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
      "SonySportsHD": "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
    };

    const videoSrc = links[id];

    if (Hls.isSupported() && videoSrc) {
      const video = document.getElementById('video');
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
    } else {
      document.body.innerHTML += "<p style='color:white;'>Channel not found or not supported.</p>";
    }
  </script>

</body>
</html>
