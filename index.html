<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1e40;
      background-image: linear-gradient(rgba(10, 30, 64, 0.9), rgba(10, 30, 64, 0.9)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* Animated Loading Screen */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #0a1e40;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #00ffff;
      letter-spacing: 5px;
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }

    header {
      width: 100%;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 25px;
      white-space: nowrap;
      padding: 0 10px;
      display: none;
    }

    /* Support Box */
    #supportBox {
      display: none;
      width: 90%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 30px 20px;
      margin-top: 50px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .box-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #25D366;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .box-title img { width: 30px; height: 30px; }

    .box-desc {
      font-size: 0.95rem;
      color: #efefef;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .join-btn {
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
      animation: pulseGlow 2s infinite;
      display: block;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 20px 10px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    .already-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* Thank You Message */
    #thankYouMsg {
      display: none;
      font-size: 1.2rem;
      color: #00ffff;
      margin-top: 20px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="loader-text">LOADING...</div>
  </div>

  <header id="headerText">CRICKETLIVE! OFFICIAL</header>

  <div id="supportBox">
    <div id="boxContent">
      <div class="box-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        Support Us!
      </div>
      <p class="box-desc">
        Join our WhatsApp channel <strong>CricketLIVE! Official</strong> 
        For Instant Update & Exclusive Links.
      </p>
      
      <div class="button-group">
        <a href="https://whatsapp.com/channel/your-link" class="join-btn" target="_blank">JOIN</a>
        <button class="already-btn" onclick="handleAlreadyJoined()">Already Joined</button>
      </div>
    </div>
    
    <div id="thankYouMsg">❤️ Thank You for your Support!</div>
  </div>

<script>
  // Loading for exactly 3 seconds
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('headerText').style.display = 'block';
    document.getElementById('supportBox').style.display = 'block';
  }, 3000);

  function handleAlreadyJoined() {
    // Hide content and show Thank You
    document.getElementById('boxContent').style.display = 'none';
    document.getElementById('thankYouMsg').style.display = 'block';

    // Hide the whole box after 2 seconds of showing Thank You
    setTimeout(() => {
      const box = document.getElementById('supportBox');
      box.style.transition = "0.5s";
      box.style.opacity = "0";
      box.style.transform = "scale(0.9)";
      setTimeout(() => {
        box.style.display = 'none';
      }, 500);
    }, 2000);
  }
</script>

</body>
</html>
