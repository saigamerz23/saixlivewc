<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a18;
      background-image: linear-gradient(rgba(5, 10, 24, 0.92), rgba(5, 10, 24, 0.92)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover; background-position: center; background-attachment: fixed;
      font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
    }

    #loadingScreen {
      position: fixed; inset: 0; background: #050a18;
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
      transition: opacity 0.6s ease;
    }
    .loader-text { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #00ffff; letter-spacing: 5px; animation: pulseText 1.5s infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

    header {
      width: 92%; max-width: 420px; text-align: center; margin-top: 35px; padding: 18px 10px;
      background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
      border-radius: 15px; border: 1px solid rgba(191, 149, 63, 0.5); 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: none;
    }
    .header-text-content { font-family: 'Orbitron', sans-serif; font-size: 1.35rem; font-weight: 700; background: linear-gradient(90deg, #fff, #00ffff, #fff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }

    /* Poster Container */
    #posterContainer {
      position: relative;
      width: 95%; max-width: 800px; margin-top: 25px; border-radius: 12px; overflow: hidden;
      border: 2px solid #00ffff; box-shadow: 0 0 25px rgba(0,255,242,0.4); display: none;
    }

    .mini-badge {
      position: absolute; top: 15px; left: 15px; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
      padding: 6px 12px; border-radius: 50px; border: 1px solid rgba(0, 255, 255, 0.5);
    }
    .mini-badge span { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #00ffff; font-weight: 700; text-transform: uppercase; }

    /* Match Poster Image */
    .match-poster {
      width: 100%; height: auto; display: block;
      filter: brightness(0.9) contrast(1.1);
    }

    .status-bar { 
      padding: 12px; font-size: 14px; text-align: center; 
      background: #111; color: #00ffff; font-weight: 600; 
      font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
    }

    #supportBox {
      display: none; width: 90%; max-width: 380px; background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px; padding: 35px 25px; margin: 30px 0 120px 0; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    .join-btn { background: #25D366; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; display: block; animation: pulseGlow 2s infinite; }
    
    .premium-ticker-wrap { width: 100%; overflow: hidden; background: rgba(3, 7, 18, 0.95); position: fixed; bottom: 0; left: 0; z-index: 1000; border-top: 1px solid rgba(0, 255, 255, 0.3); padding: 12px 0; }
    .ticker-content { display: flex; white-space: nowrap; width: max-content; animation: scroll 30s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="loader-text">CRICKETLIVE!</div>
  </div>

  <header id="headerBox">
    <div class="header-text-content">MATCH DAY LIVE</div>
  </header>

  <div id="posterContainer">
    <div class="mini-badge">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="16">
      <span>LIVE NOW</span>
    </div>
    
    <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1973&auto=format&fit=crop" alt="Cricket Match" class="match-poster">
    
    <div class="status-bar">NEXT MATCH: INDIA vs PAKISTAN - STARTS SOON</div>
  </div>

  <div id="supportBox">
    <div id="boxContent">
      <h2 style="color: #25D366; margin-bottom: 15px;">Support Us!</h2>
      <p style="margin-bottom: 20px;">Join our WhatsApp for Direct Links & Updates!</p>
      <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" class="join-btn" target="_blank">JOIN CHANNEL</a>
      <button style="background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer;" onclick="hideBox()">Close</button>
    </div>
  </div>

  <div class="premium-ticker-wrap">
    <div class="ticker-content">
      <div style="padding-right: 50px;">🏏 STAY TUNED FOR LIVE UPDATES! JOIN WHATSAPP FOR PREMIUM LINKS! 🏏</div>
      <div style="padding-right: 50px;">🏏 STAY TUNED FOR LIVE UPDATES! JOIN WHATSAPP FOR PREMIUM LINKS! 🏏</div>
    </div>
  </div>

<script>
  window.onload = function() {
    setTimeout(() => {
      document.getElementById('loadingScreen').style.opacity = "0";
      setTimeout(() => {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('headerBox').style.display = 'block';
        document.getElementById('posterContainer').style.display = 'block';
        document.getElementById('supportBox').style.display = 'block';
      }, 600);
    }, 2000);
  };

  function hideBox() {
    document.getElementById('supportBox').style.display = 'none';
  }
</script>

</body>
</html>
