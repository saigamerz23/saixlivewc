<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRICKETLIVE! OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 20px; overflow-x: hidden; }
        
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050810; display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .pop-box { background: #111827; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; border: 2px solid #00d2ff; }
        .support-text { font-family: 'Bebas Neue', cursive; font-size: 28px; color: #00d2ff; letter-spacing: 1.5px; margin-bottom: 18px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .pop-btn { padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; color: white; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }

        .header { padding: 15px 10px; background: #0f172a; border-bottom: 1px solid #1e293b; }
        .header h1, .share-header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; margin: 0; white-space: nowrap; }
        .share-header { display: none; padding: 15px 10px; }

        #live-signal-box { display: none; justify-content: flex-end; width: 96%; max-width: 850px; margin: 10px auto -15px auto; visibility: hidden; }
        #live-signal { background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 5px; font-size: 9px; font-weight: bold; color: #00ff00; border: 1px solid rgba(0, 255, 0, 0.3); display: flex; align-items: center; }
        .green-dot { height: 7px; width: 7px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .video-wrapper { 
            width: 96%; max-width: 850px; margin: 20px auto; background: #000; border: 2px solid #00d2ff; 
            border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; position: relative;
        }

        #main-player { width: 100%; height: 100%; border: 0; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .extreme-crop { 
            height: 160% !important; 
            top: -30% !important;
            transform: scale(1.05); 
        }

        #watermark {
            position: absolute; top: 8px; left: 8px; z-index: 2147483647; 
            font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 900;
            color: #ffffff; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(4px);
            padding: 3px 6px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.25); 
            display: none; text-transform: uppercase;
        }

        .reaction-bar { display: none; justify-content: center; gap: 12px; margin: 10px auto; visibility: hidden; }
        .react-btn { font-size: 20px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .floating-emoji { position: fixed; bottom: 100px; left: 50%; pointer-events: none; font-size: 35px; z-index: 10000; animation: popBounce 2s ease-out forwards; }
        @keyframes popBounce { 0% { transform: translateY(0) scale(0); opacity: 0; } 15% { transform: translateY(-30px) scale(1.5); opacity: 1; } 100% { transform: translateY(-400px) translateX(50px); opacity: 0; } }

        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; max-width: 94%; }
        .channel-button { border: none; padding: 12px 5px; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: white; background: linear-gradient(45deg, #1e293b, #334155); border: 1px solid #00d2ff; }
        .fancode-btn { background: linear-gradient(45deg, #004dff, #00d2ff) !important; color: #fff !important; grid-column: span 2; font-size: 14px; border: 2px solid #fff; }
        .wpl-btn { background: linear-gradient(45deg, #ff0080, #7928ca) !important; color: #fff !important; grid-column: span 2; font-size: 14px; border: 2px solid #fff; }
        .sa20-btn { background: linear-gradient(45deg, #f9a8d4, #00d2ff) !important; color: #000 !important; }

        #sharePreview { font-size: 10px; color: #00d2ff; background: #111827; padding: 10px; border-radius: 4px; flex-grow: 1; border: 1px solid #334155; text-align: left; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .copy-btn { background: linear-gradient(90deg, #00d2ff, #0072ff); color: white; border: none; padding: 10px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .wp-share-btn { background: #25D366; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; margin-left: 5px; }
        .join-btn { width: 90%; max-width: 420px; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px auto; color: white; }
        .hidden-mode { display: none !important; }
        #view-all-btn { display: none; margin: 10px auto; background: #ffffff; color: #000; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 12px; width: fit-content; border: 2px solid #00d2ff; }
    </style>
</head>
<body>

<div id="entry-popup">
    <div class="pop-box">
        <div class="support-text"><i class="fab fa-whatsapp"></i> JOIN US <i class="fab fa-telegram"></i></div>
        <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="pop-btn" style="background:#25D366;"><i class="fab fa-whatsapp"></i> WHATSAPP GROUP</a>
        <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="pop-btn" style="background:#0088cc;"><i class="fab fa-telegram"></i> TELEGRAM CHANNEL</a>
        <div style="margin-top:18px; cursor:pointer; font-size:11px; color:#00d2ff; font-weight:bold; text-decoration:underline;" onclick="closePopup()">CONTINUE TO STREAM</div>
    </div>
</div>

<header class="header" id="site-header"><h1>CRICKETLIVE! OFFICIAL</h1></header>
<div class="share-header" id="share-header"><h1>CRICKETLIVE! OFFICIAL</h1></div>
<div id="live-signal-box"><div id="live-signal"><span class="green-dot"></span>LIVE</div></div>

<div class="video-wrapper">
    <div id="watermark">CricketLIVE! Official</div>
    <div id="player-container"><div style="color: #64748b; padding-top: 20%; font-size: 13px;">Channel Select Karein...</div></div>
</div>

<div class="reaction-bar" id="reaction-bar">
    <div class="react-btn" onclick="react('🔥')">🔥</div>
    <div class="react-btn" onclick="react('⚡')">⚡</div>
    <div class="react-btn" onclick="react('🏏')">🏏</div>
    <div class="react-btn" onclick="react('❤️')">❤️</div>
    <div class="react-btn" onclick="react('😂')">😂</div>
</div>

<a href="/" id="view-all-btn">Show All Channels</a>

<div class="channel-grid" id="main-grid">
    <button class="channel-button fancode-btn" onclick="loadMatch('fancode_live')">📺 FANCODE LIVE (AD-FREE)</button>
    
    <button class="channel-button wpl-btn" onclick="loadMatch('wpl_live')">🏏 WPL LIVE (NEW SERVER)</button>
    <button class="channel-button" onclick="loadMatch('ss1sdeng')">STAR SPORTS 1 SD</button>
    <button class="channel-button" onclick="loadMatch('ss1enghd')">SS 1 (ENG HD)</button>
    <button class="channel-button" onclick="loadMatch('ss2sd')">STAR SPORTS 2 SD</button>
    <button class="channel-button" onclick="loadMatch('ss2hd')">STAR SPORTS 2 HD</button>
    <button class="channel-button" onclick="loadMatch('ss1hindihd')">SS 1 (HINDI HD)</button>
    <button class="channel-button" onclick="loadMatch('ss2hindisd')">SS 2 (HINDI SD)</button>
    <button class="channel-button" onclick="loadMatch('ssselect2sd')">SS SELECT 2 SD</button>
    <button class="channel-button" onclick="loadMatch('ssselect2hd')">SS SELECT 2 HD</button>
    <button class="channel-button" onclick="loadMatch('tnt1')">TNT SPORTS 1</button>
    <button class="channel-button" onclick="loadMatch('willow')">WILLOW SPORTS</button>
    <button class="channel-button" style="background: linear-gradient(45deg, #ed1c24, #2e3192); border: 1px solid #fff;" onclick="loadMatch('ss_khel')">📺 SS KHEL VHT</button>
    <button class="channel-button sa20-btn" onclick="loadMatch('sa20_live')">🔥 SA20 LIVE</button>
</div>

<div class="share-mini" id="share-box" style="display: flex; align-items: center; justify-content: center; gap: 5px; margin: 15px auto; width: 94%;">
    <div id="sharePreview">Select a channel...</div>
    <button class="copy-btn" id="copyBtn" onclick="copyShareMessage()">COPY</button>
    <button class="wp-share-btn" onclick="whatsappShare()"><i class="fab fa-whatsapp"></i></button>
</div>

<div id="social-box">
    <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="join-btn" style="background:#25D366;"><i class="fab fa-whatsapp"></i> Join WhatsApp</a>
</div>

<script>
    const channels = {
        'fancode_live': 'https://crictos.vercel.app/?url=https%3A%2F%2Fin-mc-fdlive.fancode.com%2Fmumbai%2F138751_english_hls_9494524cbc43118_1ta-di_h264%2Findex.m3u8',
        'wpl_live': 'https://teamrohittry2.pages.dev/',
        'sa20_live': 'https://skcricweb.pages.dev/ipel?id=sa20',
        'ss1sdeng': 'https://cinearena.github.io/id/sports.html?id=Star1eng',
        'ss1enghd': 'https://cinearena.github.io/id/sports.html?id=Star1engHD',
        'ss2sd': 'https://cinearena.github.io/id/sports.html?id=Star2eng',
        'ss2hd': 'https://cinearena.github.io/id/sports.html?id=Star2engHD',
        'ss1hindihd': 'https://cinearena.github.io/id/sports.html?id=Star1HindiHD',
        'ss2hindisd': 'https://cinearena.github.io/id/sports.html?id=Star2HINDISD',
        'ssselect2sd': 'https://cinearena.github.io/id/sports.html?id=StarSportsSelect2',
        'ssselect2hd': 'https://cinearena.github.io/id/sports.html?id=StarSportsSelect2HD',
        'tnt1': 'https://cinearena.github.io/id/sports.html?id=TNTSports1',
        'willow': 'https://cinearena.github.io/id/sports.html?id=WillowSports',
        'ss_khel': 'https://cinearena.github.io/id/sports.html?id=Sports18Khel'
    };

    let currentChannel = null;
    function loadMatch(slug) {
        currentChannel = slug;
        const container = document.getElementById('player-container');
        
        // Agar fancode_live hai toh crop apply nahi hoga taaki pura player dikhe
        let cropClass = (slug === 'wpl_live' || slug === 'sa20_live') ? 'class="extreme-crop"' : '';

        container.innerHTML = `<iframe id="main-player" ${cropClass} src="${channels[slug]}" sandbox="allow-scripts allow-same-origin allow-forms" allow="autoplay; encrypted-media; fullscreen" scrolling="no"></iframe>`;
        
        showUIParts();
        document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
    }

    function showUIParts() {
        if (currentChannel) {
            document.getElementById('watermark').style.display = 'inline-block';
            document.getElementById('live-signal-box').style.display = 'flex';
            document.getElementById('live-signal-box').style.visibility = 'visible';
            document.getElementById('reaction-bar').style.display = 'flex';
            document.getElementById('reaction-bar').style.visibility = 'visible';
        }
    }

    function closePopup() { document.getElementById('entry-popup').style.display = 'none'; showUIParts(); }

    function react(emoji) {
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = emoji;
        el.style.left = (40 + Math.random() * 20) + '%';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }

    function copyShareMessage() {
        const linkText = document.getElementById('sharePreview').innerText;
        if (linkText.includes("...")) return;
        navigator.clipboard.writeText(linkText);
        document.getElementById('copyBtn').innerText = "DONE!";
        setTimeout(() => { document.getElementById('copyBtn').innerText = "COPY"; }, 2000);
    }

    function whatsappShare() {
        const linkText = document.getElementById('sharePreview').innerText;
        if (linkText.includes("...")) return;
        window.open("https://api.whatsapp.com/send?text=" + linkText, '_blank');
    }

    window.onload = function() {
        const ch = new URLSearchParams(window.location.search).get('ch');
        if (ch && channels[ch]) {
            loadMatch(ch);
            document.getElementById('site-header').classList.add('hidden-mode');
            document.getElementById('share-header').style.display = 'block';
            document.getElementById('main-grid').classList.add('hidden-mode');
            document.getElementById('view-all-btn').style.display = 'block';
        }
    };
</script>

</body>
</html>
