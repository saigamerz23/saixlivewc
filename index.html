<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      z-index: 9999;
      color: transparent;
      background-image: linear-gradient(90deg, #FFD700, #FF8C00);
      background-clip: text;
      -webkit-background-clip: text;
    }

    .dots::after {
      content: '';
display: inline-block;
      animation: dots 1.5s steps(3, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }

    .container {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .title img {
      width: 38px;
      height: 38px;
    }

    .support-box {
      background: linear-gradient(145deg, #111, #1a1a1a);
      border: 2px solid #25D366;
      border-radius: 25px;
      padding: 50px 30px;
      max-width: 700px;
      margin: 0 auto;
      box-shadow: 0 0 25px #25D36688;
      animation: fadeIn 1s ease-in-out;
    }

    .support-box h2 {
      font-size: 34px;
      background: linear-gradient(90deg, #25D366, #128C7E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      text-shadow: 1px 1px 2px #000;
    }

    .support-box p {
font-size: 18px;
      color: #ddd;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .join-btn {
      padding: 14px 34px;
      font-size: 17px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 0 15px #25D366aa;
      transition: 0.3s ease;
    }

    .join-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #25D366cc;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="loader">LOADING<span class="dots"></span> PLEASE WAIT</div>

  <div class="container" id="mainContent">
    <div class="title">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" />
      CRICKETLIVE! OFFICIAL
    </div>

    <div class="support-box">
      <h2>📢 Support Us!</h2>
      <p>Join our <strong>WhatsApp channel - CricketLIVE! Official</strong> for instant match updates and exclusive live streaming links. Stay connected with real-time cricket action!</p>
<a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" class="join-btn" target="_blank">Join Now</a>
    </div>
  </div>

  <script>
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
      }, 3000);
    }
  </script>

</body>
</html>
