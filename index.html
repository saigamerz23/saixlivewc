<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    body, html {
      margin: 0; padding: 0; height: 100%; background: #0a1e40;
      font-family: 'Arial', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow-x: hidden;
    }

    /* Loading screen styles */
    #loadingScreen {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      font-weight: bold;
      color: #00ffff;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 3px;
    }
    /* Animate dots */
    #dots::after {
      content: '.';
      animation: blink 1.5s infinite;
    }
@keyframes blink {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60% { content: '...'; }
      80%, 100% { content: ''; }
    }

    /* Header: CricketLIVE! Official */
    header {
      width: 100%;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 4rem;
      background: linear-gradient(90deg, #00ffff, #8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 20px;
      user-select: none;
      z-index: 100;
      flex-shrink: 0;
    }

    /* Follow Us Box container fixed bottom */
    #followButtonContainer {
      width: 100%;
      background: linear-gradient(135deg, #25D366, #128C7E);
      padding: 20px 0;
      position: fixed;
      bottom: 0;
      left: 0;
      display: none;
      justify-content: center;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.4);
      z-index: 101;
    }
    #followButton {
      background: #075e54;
      border: none;
      color: white;
      font-size: 2rem;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      width: 90%;
      max-width: 600px;
      display: flex;
      align-items: center;
justify-content: center;
      gap: 15px;
      transition: background 0.3s ease;
    }
    #followButton:hover {
      background: #128C7E;
    }

    /* WhatsApp Animated Icon */
    .whatsapp-icon {
      width: 28px;
      height: 28px;
      animation: pulse 2s infinite;
      fill: #25D366;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

  </style>
</head>
<body>

  <div id="loadingScreen">Loading<span id="dots"></span></div>

  <header id="headerText">CRICKETLIVE! OFFICIAL</header>

  <div id="followButtonContainer">
    <button id="followButton" onclick="window.open('https://chat.whatsapp.com/your-channel-link', '_blank')">
      <svg class="whatsapp-icon" viewBox="0 0 24 24" >
<path d="M20.52 3.48A11.69 11.69 0 0012 0C5.373 0 0 5.373 0 12a11.8 11.8 0 001.68 6.03L0 24l6.21-1.63A11.76 11.76 0 0012 24c6.627 0 12-5.373 12-12a11.6 11.6 0 00-3.48-8.52zM12 21.82c-2.21 0-4.27-.72-5.96-1.94l-.42-.27-3.69.97.99-3.6-.28-.37A9.94 9.94 0 012 12c0-5.51 4.49-10 10-10s10 4.49 10 10-4.49 10-10 10zm5.48-6.8l-1.6-.75a.62.62 0 00-.6.07c-.4.3-1.27.75-2.43-1.15a8.9 8.9 0 01-1.59-2.4c-.17-.39-.02-.6.13-.78.14-.15.32-.4.48-.6a.63.63 0 00.1-.6l-1.05-2.53a.32.32 0 00-.57-.1c-.2.2-.82.78-1.05 1.04-.35.4-.7.9-1.02 1.32a.43.43 0 00-.04.45c.14.24 1.95 3 4.7 4.2a8.35 8.35 0 002.63 1.02c.36.06.57.06.78-.1a1.05 1.05 0 00.38-.6c.13-.26.45-1.05.52-1.17a.27.27 0 00-.02-.3z"/>
      </svg>
      Follow Us For Support - Join WhatsApp Channel
    </button>
  </div>

<script>
  // Hide header and button initially, show loading first
  const loading = document.getElementById('loadingScreen');
  const header = document.getElementById('headerText');
  const followContainer = document.getElementById('followButtonContainer');

  header.style.display = 'none';
  followContainer.style.display = 'none';

  // After 3 seconds hide loading, show header and button
  setTimeout(() => {
    loading.style.display = 'none';
    header.style.display = 'block';
followContainer.style.display = 'flex';
  }, 3000);
</script>

</body>
</html>
