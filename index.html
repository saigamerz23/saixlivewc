<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .header { padding: 15px; font-size: 22px; font-weight: bold; color: #38bdf8; }
        
        .player-container { 
            position: relative; 
            width: 95%; max-width: 800px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #334155; border-radius: 10px; overflow: hidden; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- PERFECT WATERMARK COVER (Full Screen Compatible) --- */
        .watermark-cover {
            position: absolute;
            /* In values ko aap 1-2 pixel upar-niche karke perfect fit kar sakte hain */
            top: 8px; 
            left: 8px; 
            background: #000000; /* Solid Black takki niche ka kuch na dikhe */
            padding: 4px 10px;
            font-size: 13px;
            font-weight: bold;
            color: #38bdf8;
            border-radius: 4px;
            z-index: 2147483647; /* Sabse upar */
            pointer-events: none;
            border: 1px solid #1e293b;
            display: none;
        }

        /* --- POPUP OVERLAY --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999999;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 12px 25px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 15px;
        }
        
        .close-text { font-size: 14px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container" id="video-area">
        <div id="cover" class="watermark-cover">CricketLIVE! Official</div>

        <div id="my-overlay">
            <h2 style="margin-bottom:10px;">Watch Live Match</h2>
            <button class="promo-btn" onclick="openWhatsApp()">
                JOIN WHATSAPP & WATCH LIVE
            </button>
            <span class="close-text" onclick="hideOverlay()">Already Joined (Direct Watch)</span>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        
        // Player Source
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function openWhatsApp() {
            window.open('https://whatsapp.com/channel/AapkaLink', '_blank');
            hideOverlay();
        }

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            document.getElementById('cover').style.display = 'block';
        }

        /* --- FULL SCREEN LOGIC --- */
        // Ye script check karega ki agar video full screen hoti hai to logo ko wahi rakhe
        document.addEventListener('fullscreenchange', function() {
            const cover = document.getElementById('cover');
            if (document.fullscreenElement) {
                cover.style.position = "fixed"; // Full screen mein fixed kar dega
            } else {
                cover.style.position = "absolute"; // Wapas aane par normal
            }
        });
    </script>

</body>
</html>
