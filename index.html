        /* VIDEO WRAPPER */
        .video-wrapper { 
            width: 96%; max-width: 850px; margin: 20px auto; background: #000; border: 1px solid rgba(0, 210, 255, 0.5); 
            border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #main-player { width: 100%; height: 100%; border: 0; position: absolute; left: 0; z-index: 1; transform-origin: top center; transition: opacity 0.5s; }
        
        /* CROPS */
        .fox-crop { height: 175% !important; top: -65% !important; transform: scale(1.02); }
        .criclife-crop { height: 180% !important; top: -63% !important; transform: scale(1.03); }
        .standard-crop { height: 160% !important; top: -35% !important; transform: scale(1.05); }
        .prime-sa20-fix { height: 170% !important; top: -50% !important; transform: scale(1.05); }
        .fixed-controls { height: 100% !important; top: 0 !important; transform: scale(1) !important; }

        .skeleton { width: 100%; height: 100%; background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; display: none; position: absolute; top: 0; left: 0; z-index: 5; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #watermark { position: absolute; top: 8px; left: 8px; z-index: 10; font-family: 'Orbitron', sans-serif; font-size: 8px; color: #ffffff; background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 4px; display: none; text-transform: uppercase; pointer-events: none; }

        /* REACTION BAR */
        .reaction-bar { display: none; justify-content: center; gap: 12px; margin: 15px auto; transition: 0.3s; }
        .react-btn { font-size: 24px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); color: white; }
        
        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; max-width: 94%; }
        .channel-button { border: none; padding: 12px 5px; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: white; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.3); transition: 0.2s; }
        
        /* Specialized Styles */

        .hotstar-btn { background: linear-gradient(45deg, #001524, #004e92) !important; grid-column: span 2; font-size: 14px; }
        .special-btn { background: linear-gradient(45deg, #f9a8d4, #00d2ff) !important; color: #000 !important; }

        #sharePreview { font-size: 10px; color: #00d2ff; background: rgba(17, 24, 39, 0.8); padding: 10px; border-radius: 4px; flex-grow: 1; border: 1px solid rgba(51, 65, 85, 0.5); text-align: left; overflow: hidden; white-space: nowrap; }
        .copy-btn { background: linear-gradient(90deg, #00d2ff, #0072ff); color: white; border: none; padding: 10px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .social-container { display: flex; flex-direction: column; gap: 10px; align-items: center; margin: 15px auto; width: 90%; max-width: 420px; }
        .join-btn-base { width: 100%; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; }
        .join-wp { background: rgba(37, 211, 102, 0.15); border: 1px solid #25D366; }
        .join-tg { background: rgba(0, 136, 204, 0.15); border: 1px solid #0088cc; }
    </style>
</head>

<script>
    const channels = {

        'jiohotstar': 'https://allrounderlive.pages.dev/player2?url=https://dillzyserver.dillzycreations.workers.dev/live/hotstar.m3u8',
        'fox_501': 'https://teamroiframe07.pages.dev/',
        'cricbuzz_1': 'https://paste.fledding.com/~Willo.html',
        'cricbuzz_2': 'https://teamrocricbuzz2.pages.dev/',
        'sony_liv': 'https://crickettv.site/sonyliv/sonyliv-1',
        'sony_liv_2': 'https://crickettv.site/sonyliv/sonyliv-5',
        'hotstar_live': 'https://run-machine.pages.dev/?id=hindi',
        'fancode': 'https://teamrofemcodeplyr2.pages.dev/match.html?id=138758&cdn=fancode_cdn',
        'ss2sd': 'https://insiderlivehd.pages.dev/English',
        'ss2hd': 'https://insiderlivehd.pages.dev/Fox',
        'tnt1': 'https://crickettv.site/world-sports/player?id=tnt-sports-1',
        'tnt2': 'https://allrounderlive.pages.dev/world-sports/player?id=tnt-sports-2',
        'willow': 'https://wlo-cricstreamiing.pages.dev/',
        'willow_ios': 'https://skcricweb.pages.dev/ipel?id=willowios',
        'prime_live': 'https://edlios.pages.dev/edid?id=u19'
    };

    let currentChannel = null;
    let popupClosed = false;

    function closePopup() {
        document.getElementById('entry-popup').style.display = 'none';
        popupClosed = true;
    }

    function loadMatch(slug) {
        currentChannel = slug;
        const container = document.getElementById('player-container');
        document.getElementById('loading-skeleton').style.display = 'block';
        
        // Anti-Ad Sandbox: allow-scripts and allow-same-origin keep player working but block popups
        container.innerHTML = `<iframe id="main-player" class="fixed-controls" src="${channels[slug]}" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; encrypted-media; fullscreen" scrolling="no" onload="hideSkeleton()"></iframe>`;
        
        if (popupClosed) {
            document.getElementById('live-signal-box').style.display = 'flex';
            document.getElementById('reaction-bar').style.display = 'flex';
        }
        document.getElementById('watermark').style.display = 'inline-block';
        document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hideSkeleton() { document.getElementById('loading-skeleton').style.display = 'none'; }

    function react(emoji) {
        const e = document.createElement('div');
        e.className = 'floating-emoji';
        e.style.position = 'fixed'; e.style.bottom = '100px'; e.style.left = '50%';
        e.style.fontSize = '35px'; e.style.zIndex = '10000';
        e.innerText = emoji;
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 2000);
    }

    function copyShareMessage() {
        const link = document.getElementById('sharePreview').innerText;
        navigator.clipboard.writeText("Watch Live: " + link);
        alert("Link Copied!");
    }
</script>
