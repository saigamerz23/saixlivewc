<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CricketLIVE! Official</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
    .title {
      font-size: 60px;
      font-weight: bold;
      font-style: italic;
      background: linear-gradient(to right, #00bfff, #ff00cc);
      -webkit-background-clip: text;
      color: transparent;
      margin: 30px 0 10px 0;
      letter-spacing: 1px;
    }
    video {
      width: 100%;
      height: auto;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="title">CricketLIVE! Official</div>

  <video id="video" controls autoplay muted></video>

  <script>
    // Auto-open WhatsApp channel (best effort)
setTimeout(function () {
      window.open("https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q", "_blank");
    }, 500); // slight delay after load

    // Stream logic
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const links = {
      "Star1HindiHD": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
    };

    const videoSrc = links[id];

    if (Hls.isSupported() && videoSrc) {
      const video = document.getElementById('video');
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
    } else {
      document.body.innerHTML += "<p style='color:white;'>Channel not found or not supported.</p>";
    }
  </script>

</body>
</html>
