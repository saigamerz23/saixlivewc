<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #080d17; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; overflow: hidden; }
        .header { padding: 12px; font-size: 20px; font-weight: 800; color: #38bdf8; letter-spacing: 1px; text-transform: uppercase; }
        
        .player-container { 
            position: relative; 
            width: 96%; max-width: 850px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 1.5px solid #1e293b; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- FINAL PERFECT FIT PREMIUM TAG --- */
        .watermark-cover {
            position: absolute;
            /* Screenshot ke hisaab se MomixTV ka logo theek yahan hai */
            top: 26px; 
            left: 20px; 
            
            /* Premium Glossy Styling */
            background: linear-gradient(145deg, #0f172a, #000000);
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 800;
            color: #38bdf8;
            border-radius: 6px;
            z-index: 2147483647;
            pointer-events: none;
            display: none;
            
            /* Purane logo ko dhakne ke liye solid border aur shadow */
            border: 1.5px solid rgba(56, 189, 248, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,1), 0 0 10px rgba(56, 189, 248, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Fullscreen adjustment: Taaki video bada hone par logo wahi fit rahe */
        .player-container:fullscreen .watermark-cover,
        .player-container:-webkit-full-screen .watermark-cover {
            top: 35px !important;
            left: 30px !important;
            font-size: 16px !important;
            padding: 10px 22px !important;
        }

        /* --- OVERLAY POPUP --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #080d17; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999999;
        }

        .promo-btn {
            background: linear-gradient(135deg, #22c55e, #15803d);
            color: white; border: none;
            padding: 14px 28px; font-size: 17px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
            transition: 0.3s;
        }
        
        .close-text { font-size: 14px; color: #64748b; cursor: pointer; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container" id="player-box">
        <div id="cover" class="watermark-cover">CricketLIVE Official</div>

        <div id="my-overlay">
            <h2 style="margin-bottom:10px; color:#fff;">Live Match Ready</h2>
            <p style="color:#94a3b8; margin-bottom:25px;">Join WhatsApp for Direct Live Match Links</p>
            <button class="promo-btn" onclick="openChannel()">
                JOIN WHATSAPP & WATCH
            </button>
            <span class="close-text" onclick="hideOverlay()">Already Joined - Skip</span>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        
        // Iframe source set
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function openChannel() {
            window.open('https://whatsapp.com/channel/AapkaLink', '_blank');
            hideOverlay();
        }

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            document.getElementById('cover').style.display = 'block';
        }

        // Fullscreen security check
        document.addEventListener('fullscreenchange', () => {
            const cover = document.getElementById('cover');
            if (document.fullscreenElement) {
                cover.style.zIndex = "2147483647";
            }
        });
    </script>

</body>
</html>
