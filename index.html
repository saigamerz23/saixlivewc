<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRICKETLIVE! OFFICIAL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; overflow-x: hidden; }
        
        /* Clean Header */
        .header { padding: 15px; background: #0f172a; border-bottom: 2px solid #00d2ff; }
        .header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; margin: 0; }

        /* Full Layout Match List (No Box) */
        #list-container { width: 100%; height: 90vh; display: block; }
        #fancode-frame { width: 100%; height: 100%; border: none; }

        /* Player Section (Clean & Full) */
        #player-section { display: none; width: 100%; background: #000; }
        .video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* SHARE SECTION - New & Visible Design */
        #share-controls { display: none; padding: 20px 10px; background: #0a0f1e; border-top: 1px solid #1e293b; }
        .share-url-box { background: #000; padding: 12px; border-radius: 8px; font-size: 12px; color: #00d2ff; border: 1px solid #334155; margin-bottom: 15px; word-break: break-all; text-align: center; }
        
        .btn-flex { display: flex; gap: 10px; justify-content: center; max-width: 500px; margin: 0 auto; }
        .action-btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .copy-sky { background: #00d2ff; color: #000; }
        .wa-green { background: #25D366; color: #fff; }

        /* Simple Back Button */
        #back-btn { display: none; margin: 10px auto; background: #fff; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header class="header"><h1>CRICKETLIVE! OFFICIAL</h1></header>

<button id="back-btn" onclick="goHome()">← WAPAS LIST PAR JAYEIN</button>

<div id="list-container">
    <iframe id="fancode-frame" src="https://teamrofemcodeweb2.pages.dev/Femcode" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<div id="player-section">
    <div class="video-wrapper">
        <iframe id="main-player" src="" allow="autoplay; encrypted-media; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
    
    <div id="share-controls">
        <div style="font-size: 14px; color: #94a3b8; margin-bottom: 10px;">Doston ko share karein:</div>
        <div class="share-url-box" id="matchUrl">Generating link...</div>
        <div class="btn-flex">
            <button class="action-btn copy-sky" onclick="copyLink()"><i class="fas fa-copy"></i> COPY LINK</button>
            <button class="action-btn wa-green" onclick="waShare()"><i class="fab fa-whatsapp"></i> WHATSAPP</button>
        </div>
    </div>
</div>

<script>
    const myUrl = window.location.origin + window.location.pathname;

    // Listener for Match Select
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'matchSelect') {
            openPlayer(e.data.id);
        }
    });

    function openPlayer(id) {
        // UI Badlein
        document.getElementById('list-container').style.display = 'none';
        document.getElementById('player-section').style.display = 'block';
        document.getElementById('share-controls').style.display = 'block';
        document.getElementById('back-btn').style.display = 'block';

        // Match Link Load Karein
        const pUrl = `https://teamrofemcodeplyr2.pages.dev/match.html?id=${id}&cdn=fancode_cdn`;
        document.getElementById('main-player').src = pUrl;

        // Aapka Site Link Share Ke Liye
        const shareLink = `${myUrl}?m=${id}`;
        document.getElementById('matchUrl').innerText = shareLink;
        
        window.scrollTo(0,0);
    }

    function goHome() {
        window.location.href = myUrl;
    }

    function copyLink() {
        const linkText = document.getElementById('matchUrl').innerText;
        navigator.clipboard.writeText(linkText);
        alert("Match link copy ho gaya! Ab kahin bhi paste karein.");
    }

    function waShare() {
        const linkText = document.getElementById('matchUrl').innerText;
        const msg = encodeURIComponent("Bhai! Free mein live cricket dekhle yahan: " + linkText);
        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
    }

    // Auto-load if someone opens shared link
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const m = params.get('m');
        if (m) openPlayer(m);
    };
</script>

</body>
</html>
