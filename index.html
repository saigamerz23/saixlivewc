<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .header { padding: 15px; font-size: 22px; font-weight: bold; color: #38bdf8; }
        
        .player-container { 
            position: relative; 
            width: 95%; max-width: 800px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #334155; border-radius: 10px; overflow: hidden; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- WATERMARK BLOCKER (MomixTV ko hide karne ke liye) --- */
        .watermark-cover {
            position: absolute;
            top: 10px; /* Agar logo niche hai to isse bottom: 10px kar dein */
            left: 10px; /* Agar logo right mein hai to isse right: 10px kar dein */
            background: #0f172a; /* Player jaisa dark color */
            padding: 5px 12px;
            font-size: 14px;
            font-weight: bold;
            color: #38bdf8;
            border-radius: 4px;
            z-index: 10; /* Player ke upar dikhega */
            pointer-events: none; /* Isse video ke buttons dabane mein dikkat nahi hogi */
            border: 1px solid #334155;
            display: none; /* Shuruat mein hide rahega jab tak video start na ho */
        }

        /* --- AAPKA POPUP --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 1); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 12px 25px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 10px;
        }
        
        .close-text { font-size: 13px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container">
        <div id="cover" class="watermark-cover">CricketLIVE! Official</div>

        <div id="my-overlay">
            <h2 style="margin-bottom:10px;">Live Match Ready</h2>
            <button class="promo-btn" onclick="hideOverlay()">
                JOIN & WATCH LIVE
            </button>
            <span class="close-text" onclick="hideOverlay()">Already Joined</span>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            // Video chalte hi hamara naya logo dikhne lagega
            document.getElementById('cover').style.display = 'block';
        }
    </script>

</body>
</html>
