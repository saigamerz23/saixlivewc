<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1e40;
      background-image: linear-gradient(rgba(10, 30, 64, 0.85), rgba(10, 30, 64, 0.85)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    #loadingScreen {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      color: #00ffff;
      z-index: 1000;
    }

    header {
      width: 100%;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 25px;
      white-space: nowrap;
      padding: 0 10px;
    }

    #supportBox {
      display: none;
      width: 90%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 30px 20px;
      margin-top: 50px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .box-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #25D366;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .box-title img {
      width: 30px;
      height: 30px;
    }

    .box-desc {
      font-size: 0.95rem;
      color: #efefef;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Animated Join Button */
    .join-btn {
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: pulseGlow 2s infinite;
      border: none;
      display: block;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); transform: scale(1); }
      50% { box-shadow: 0 0 20px 10px rgba(37, 211, 102, 0); transform: scale(1.03); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); transform: scale(1); }
    }

    .already-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .already-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>

  <div id="loadingScreen">LOADING...</div>

  <header id="headerText">CRICKETLIVE! OFFICIAL</header>

  <div id="supportBox">
    <div class="box-title">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
      Support Us!
    </div>
    <p class="box-desc">
      Join our WhatsApp channel <strong>CricketLIVE! Official</strong> 
      For Instant Update & Exclusive Links.
    </p>
    
    <div class="button-group">
      <a href="https://whatsapp.com/channel/your-link" class="join-btn" target="_blank">JOIN</a>
      <button class="already-btn" onclick="hideBox()">Already Joined</button>
    </div>
  </div>

<script>
  // Show content after loading
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('supportBox').style.display = 'block';
  }, 2500);

  // Function to hide the box
  function hideBox() {
    const box = document.getElementById('supportBox');
    box.style.transition = "0.4s";
    box.style.opacity = "0";
    box.style.transform = "translateY(20px)";
    setTimeout(() => {
      box.style.display = 'none';
    }, 400;
  }
</script>

</body>
</html>
