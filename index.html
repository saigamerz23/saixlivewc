<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CricketLIVE! Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #loader h1 {
      font-size: 50px;
      font-family: 'Playfair Display', serif;
      color: #25D366;
      margin-bottom: 20px;
    }

    #loader p {
      font-size: 28px;
      color: #FFD700;
      animation: dots 1.5s steps(3, end) infinite;
    }

    @keyframes dots {
0% { content: 'Loading'; }
      33% { content: 'Loading.'; }
      66% { content: 'Loading..'; }
      100% { content: 'Loading...'; }
    }

    .main {
      display: none;
      text-align: center;
      padding: 30px;
    }

    .header {
      font-family: 'Orbitron', sans-serif;
      font-size: 50px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .header img {
      width: 35px;
    }

    .support-box {
      background: #111;
      border: 2px solid #25D366;
      border-radius: 25px;
      padding: 40px;
      max-width: 700px;
      margin: 50px auto;
      box-shadow: 0 0 20px #25D36680;
    }

    .support-box h2 {
      font-size: 30px;
      color: #25D366;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .support-box h2 img {
      width: 26px;
      animation: pulse 1.5s infinite;
    }

    .support-box p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 25px;
margin: 10px;
      cursor: pointer;
      border: none;
    }

    .btn-join {
      background: linear-gradient(to right, #25D366, #128C7E);
      color: white;
      animation: glow 1s infinite alternate;
    }

    .btn-skip {
      background: #333;
      color: #ccc;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #25D366; }
      100% { box-shadow: 0 0 20px #25D366, 0 0 30px #25D366; }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <h1>Welcome</h1>
    <p>Loading... Please Wait</p>
  </div>

  <div class="main" id="mainContent">
    <div class="header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
      CRICKETLIVE! OFFICIAL
    </div>

    <div class="support-box" id="supportBox">
      <h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
        Support Us!
      </h2>
      <p>Join our WhatsApp channel <strong>CricketLIVE! Official</strong> for instant updates & exclusive links.</p>
      <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank">
<button class="btn btn-join">Join Now</button>
      </a>
      <button class="btn btn-skip" onclick="hideSupport()">Already Joined</button>
    </div>
  </div>

  <script>
    window.onload = () => {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
      }, 3000);
    }

    function hideSupport() {
      document.getElementById('supportBox').style.display = 'none';
    }
  </script>

</body>
</html>
