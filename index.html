<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    body, html {
      margin: 0; padding: 0; height: 100%; 
      background: #0a1e40;
      font-family: 'Arial', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      /* Mobile touch scrolling smooth karne ke liye */
      -webkit-overflow-scrolling: touch;
    }

    /* Loading screen mobile optimized */
    #loadingScreen {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem; /* Mobile ke liye font chota kiya */
      font-weight: bold;
      color: #00ffff;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      text-align: center;
      width: 100%;
    }

    #dots::after {
      content: '.';
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60% { content: '...'; }
      80%, 100% { content: ''; }
    }

    /* Header: Mobile Friendly Size */
    header {
      width: 90%;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.8rem; /* Desktop par 4rem tha, mobile ke liye 1.8rem */
      background: linear-gradient(90deg, #00ffff, #8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 30px;
      user-select: none;
      z-index: 100;
      line-height: 1.2;
    }

    /* Bottom Support Box - Mobile Design */
    #followButtonContainer {
      width: 100%;
      background: rgba(18, 140, 126, 0.95); /* Thoda transparent look */
      padding: 15px 0;
      position: fixed;
      bottom: 0;
      left: 0;
      display: none;
      justify-content: center;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.4);
      z-index: 101;
      backdrop-filter: blur(10px); /* Premium blur effect */
    }

    #followButton {
      background: #25D366;
      border: none;
      color: white;
      font-size: 1.1rem; /* Mobile readable font */
      font-weight: 700;
      padding: 15px 20px;
      border-radius: 12px; /* Thoda modern square-round look */
      cursor: pointer;
      width: 90%; /* Phone screen ki side margins ke liye */
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s active;
    }

    /* Mobile par click karne par feedback */
    #followButton:active {
      transform: scale(0.95);
    }

    .whatsapp-icon {
      width: 24px;
      height: 24px;
      animation: pulse 2s infinite;
      fill: #fff;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* Extra small phones ke liye adjustment */
    @media (max-width: 360px) {
      header { font-size: 1.5rem; }
      #followButton { font-size: 0.9rem; padding: 12px; }
    }
  </style>
</head>
<body>

  <div id="loadingScreen">Loading<span id="dots"></span></div>

  <header id="headerText">CRICKETLIVE! OFFICIAL</header>

  <div id="followButtonContainer">
    <button id="followButton" onclick="window.open('https://whatsapp.com/channel/your-link-here', '_blank')">
      <svg class="whatsapp-icon" viewBox="0 0 24 24" >
        <path d="M20.52 3.48A11.69 11.69 0 0012 0C5.373 0 0 5.373 0 12a11.8 11.8 0 001.68 6.03L0 24l6.21-1.63A11.76 11.76 0 0012 24c6.627 0 12-5.373 12-12a11.6 11.6 0 00-3.48-8.52zM12 21.82c-2.21 0-4.27-.72-5.96-1.94l-.42-.27-3.69.97.99-3.6-.28-.37A9.94 9.94 0 012 12c0-5.51 4.49-10 10-10s10 4.49 10 10-4.49 10-10 10zm5.48-6.8l-1.6-.75a.62.62 0 00-.6.07c-.4.3-1.27.75-2.43-1.15a8.9 8.9 0 01-1.59-2.4c-.17-.39-.02-.6.13-.78.14-.15.32-.4.48-.6a.63.63 0 00.1-.6l-1.05-2.53a.32.32 0 00-.57-.1c-.2.2-.82.78-1.05 1.04-.35.4-.7.9-1.02 1.32a.43.43 0 00-.04.45c.14.24 1.95 3 4.7 4.2a8.35 8.35 0 002.63 1.02c.36.06.57.06.78-.1a1.05 1.05 0 00.38-.6c.13-.26.45-1.05.52-1.17a.27.27 0 00-.02-.3z"/>
      </svg>
      Follow Us On WhatsApp
    </button>
  </div>

<script>
  const loading = document.getElementById('loadingScreen');
  const header = document.getElementById('headerText');
  const followContainer = document.getElementById('followButtonContainer');

  header.style.display = 'none';
  followContainer.style.display = 'none';

  setTimeout(() => {
    loading.style.display = 'none';
    header.style.display = 'block';
    followContainer.style.display = 'flex';
  }, 3000);
</script>

</body>
</html>
