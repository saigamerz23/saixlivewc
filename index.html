<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a18;
      background-image: linear-gradient(rgba(5, 10, 24, 0.92), rgba(5, 10, 24, 0.92)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 92%; max-width: 420px; text-align: center; margin-top: 20px; padding: 15px;
      background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
      border-radius: 15px; border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .header-text {
      font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
      background: linear-gradient(90deg, #fff, #00ffff, #fff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Video Player Container */
    .player-box {
      width: 95%; max-width: 800px; margin-top: 20px;
      background: #000; border-radius: 10px; overflow: hidden;
      border: 2px solid #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    video { width: 100%; aspect-ratio: 16/9; display: block; }

    .status-bar {
      padding: 10px; font-size: 12px; text-align: center; color: #00ffff;
      background: rgba(0,0,0,0.5); font-weight: bold;
    }

    /* Support Box */
    #supportBox {
      width: 90%; max-width: 380px; background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(25px); border-radius: 20px; padding: 20px;
      margin: 20px 0 100px 0; text-align: center; border: 1px solid rgba(255,255,255,0.1);
    }

    .join-btn {
      background: #25D366; color: white; text-decoration: none;
      padding: 12px; border-radius: 10px; display: block; font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-text">CRICKETLIVE! OFFICIAL</div>
  </header>

  <div class="player-box">
    <video id="video" controls autoplay playsinline poster="https://fancode.com/images/fancode-logo.png"></video>
    <div id="status" class="status-bar">Connecting to secure stream...</div>
  </div>

  <div id="supportBox">
    <p>Join our WhatsApp channel for Instant Updates!</p>
    <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" class="join-btn" target="_blank">JOIN WHATSAPP</a>
  </div>

<script>
  var video = document.getElementById('video');
  var status = document.getElementById('status');
  
  // 👇 YAHAN NAYA LINK DALEIN (Kiwi Browser se nikal kar)
  var rawUrl = 'https://in-mc-fdlive.fancode.com/mumbai/138924_english_hls_6196cf49e75704_1ta-di_h264/1080p.m3u8';

  // Proxy to bypass CORS
  var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rawUrl);

  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(proxyUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
      status.innerText = "LIVE STREAMING...";
    });
    hls.on(Hls.Events.ERROR, function(event, data) {
      if (data.fatal) {
        status.innerText = "LINK EXPIRED! Get new link from Kiwi Browser.";
        status.style.color = "red";
      }
    });
  }
</script>

</body>
</html>
