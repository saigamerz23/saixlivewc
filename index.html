<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; overflow-x: hidden; }
        .header { padding: 15px; font-size: 22px; font-weight: bold; color: #38bdf8; }
        
        .player-container { 
            position: relative; /* Isse layer upar aayegi */
            width: 95%; max-width: 800px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #334155; border-radius: 10px; overflow: hidden; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- AAPKA POPUP LAYER --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); /* Dark background */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; /* Sabse upar */
            transition: 0.5s;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 12px 25px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .promo-btn:hover { background: #16a34a; transform: scale(1.05); }
        
        .close-text { font-size: 12px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container">
        <div id="my-overlay">
            <h2 style="margin-bottom:10px;">Live Match Ready!</h2>
            <p style="font-size: 14px; color: #cbd5e1; margin-bottom: 20px;">Match dekhne ke liye niche click karein</p>
            
            <button class="promo-btn" onclick="window.open('https://t.me/AapkaChannel', '_blank'); hideOverlay();">
                JOIN TELEGRAM & WATCH
            </button>
            
            <span class="close-text" onclick="hideOverlay()">Directly Watch (Skip)</span>
        </div>

        <iframe id="main-player" 
                src="" 
                allow="autoplay; encrypted-media; fullscreen" 
                referrerpolicy="no-referrer"
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');

        // URL set karein lekin player ko piche rehne dein
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        // Function jo aapke popup ko hatayega
        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
        }
    </script>

</body>
</html>
