<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricketLIVE! Official - SA20 LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 40px; overflow-x: hidden; }
        
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 16, 0.98); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .pop-box { background: #111827; padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; border: 2px solid #00d2ff; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); }
        .pop-btn { padding: 14px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-bottom: 12px; color: white; font-size: 14px; transition: 0.3s; }

        .header { padding: 15px; background: #0f172a; border-bottom: 2px solid #00d2ff; }
        .header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 20px; margin: 0; }

        /* Video Box Container */
        .video-wrapper { 
            width: 94%; 
            max-width: 800px; 
            margin: 25px auto; 
            background: #000; 
            position: relative; 
            border: 2px solid #00d2ff; 
            border-radius: 12px; 
            overflow: hidden; /* Yeh bahar nikle hue hisse ko kaat dega */
            aspect-ratio: 16 / 9; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); 
        }

        .video-container { width: 100%; height: 100%; position: relative; background: #000; overflow: hidden; }
        
        /* Iframe Adjustment: Ise aur upar aur bada kiya gaya hai taaki ache se fit ho */
        iframe { 
            width: 100% !important; 
            height: 130% !important; /* Height badhayi gayi hai */
            border: 0; 
            position: absolute; 
            top: -45px; /* Ise aur upar khiskaya gaya hai */
            left: 0;
            transform: scale(1.05); /* Thoda zoom taaki gaps na dikhen */
        }

        .channel-grid { display: flex; justify-content: center; margin: 20px auto; max-width: 94%; }
        .channel-button { border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: white; transition: 0.3s; width: 100%; max-width: 400px; background: linear-gradient(45deg, #00d2ff, #0072ff); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .share-section { margin-top: 20px; padding: 15px; background: #1e293b; border-radius: 15px; width: 90%; max-width: 450px; margin: auto; border: 1.5px dashed #00d2ff; }
        .share-preview { background: #050810; padding: 12px; border-radius: 8px; font-size: 13px; color: #cbd5e1; text-align: left; margin-bottom: 15px; white-space: pre-wrap; border: 1px solid #334155; overflow-wrap: break-word; }
        .copy-btn { background: linear-gradient(90deg, #00d2ff, #0072ff); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; }
        
        .join-container { margin-top: 25px; padding: 0 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .join-btn { width: 90%; max-width: 420px; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; display: block; transition: 0.3s; }
        .wa-btn { background: #25D366; color: white; }
        .tg-btn { background: #0088cc; color: white; }
    </style>
</head>
<body>

    <div id="entry-popup">
        <div class="pop-box">
            <h2 style="font-family:'Orbitron'; color:#00d2ff; font-size: 18px; margin-bottom:20px;">SA20 2026 LIVE </h2>
            <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="pop-btn" style="background:#25D366;">JOIN WHATSAPP CHANNEL</a>
            <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="pop-btn" style="background:#0088cc;">JOIN TELEGRAM CHANNEL</a>
            <div style="margin-top:20px; cursor:pointer; font-size:12px; color:#64748b; text-decoration:underline;" onclick="closePopup()">CONTINUE TO STREAM</div>
        </div>
    </div>

    <header class="header"><h1>CricketLIVE! Official</h1></header>

    <div class="video-wrapper">
        <div class="video-container" id="player-container">
            <div style="color: #64748b; padding-top: 20%;">Click SA20 LIVE button to start...</div>
        </div>
    </div>

    <div class="channel-grid">
        <button class="channel-button" onclick="loadMatch()">SA20 LIVE</button>
    </div>

    <div class="share-section">
        <div class="share-preview" id="sharePreview">Join and Watch SA20 Live Match!</div>
        <button class="copy-btn" onclick="copyShareMessage()">COPY & SHARE MESSAGE</button>
    </div>

    <div class="join-container">
        <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="join-btn wa-btn">Join WhatsApp Group</a>
        <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="join-btn tg-btn">Join Telegram Channel</a>
    </div>

    <script>
        const STREAM_URL = "https://teamroiframe5.pages.dev/";
        const MY_DOMAIN = "https://cricket-live-official.vercel.app/";

        function loadMatch() {
            const container = document.getElementById('player-container');
            container.innerHTML = `<iframe src="${STREAM_URL}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>`;
            
            document.getElementById('sharePreview').innerText = `*Watch SA20 Live on CricketLIVE! Official* \n\n*Link:* ${MY_DOMAIN}`;
        }

        function copyShareMessage() {
            const text = document.getElementById('sharePreview').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Share Message Copied!");
            });
        }

        function closePopup() { document.getElementById('entry-popup').style.display = 'none'; }
    </script>
</body>
</html>
