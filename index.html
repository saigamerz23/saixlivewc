<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a18;
      background-image: linear-gradient(rgba(5, 10, 24, 0.92), rgba(5, 10, 24, 0.92)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* Premium Loading Screen */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #050a18;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .welcome-text {
      font-family: 'Poppins', sans-serif;
      font-size: 1.2rem; /* Chhota size */
      font-weight: 600;
      color: #bf953f; /* Luxury Gold */
      letter-spacing: 2px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem; /* Bada font size */
      color: #00ffff;
      letter-spacing: 5px;
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* Luxury Header Box */
    header {
      width: 92%;
      max-width: 420px;
      text-align: center;
      margin-top: 35px;
      padding: 18px 10px;
      position: relative;
      display: none;
      z-index: 100;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border-radius: 15px;
      border: 1px solid rgba(191, 149, 63, 0.5); 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(191, 149, 63, 0.1);
    }

    .header-text-content {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      white-space: nowrap;
      background: linear-gradient(90deg, #fff, #00ffff, #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }

    @keyframes shine { to { background-position: 200% center; } }

    /* Support Box */
    #supportBox {
      display: none;
      width: 90%;
      max-width: 380px;
      background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 35px 25px;
      margin-top: 45px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      animation: slideIn 0.7s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .box-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #25D366;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .box-title img { width: 32px; }

    .box-desc {
      font-size: 0.95rem;
      color: #efefef;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .join-btn {
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
      animation: pulseGlow 2s infinite;
      display: block;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 20px 10px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    .already-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #aaa;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* Simple Thank You Message */
    #thankYouMsg {
      display: none;
      font-size: 1.2rem;
      color: #00ffff;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="welcome-text">Welcome</div>
    <div class="loader-text">LOADING...</div>
  </div>

  <header id="headerBox">
    <div class="header-text-content">CRICKETLIVE! OFFICIAL</div>
  </header>

  <div id="supportBox">
    <div id="boxContent">
      <div class="box-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        Support Us!
      </div>
      <p class="box-desc">
        Join our WhatsApp channel <strong>CricketLIVE! Official</strong> 
        For Instant Update & Exclusive Links.
      </p>
      
      <div class="button-group">
        <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" class="join-btn" target="_blank">JOIN</a>
        <button class="already-btn" onclick="handleAlreadyJoined()">Already Joined</button>
      </div>
    </div>
    
    <div id="thankYouMsg">❤️ Thank You for your Support!</div>
  </div>

<script>
  // 3 Seconds Loading
  setTimeout(() => {
    document.getElementById('loadingScreen').style.transition = "0.6s";
    document.getElementById('loadingScreen').style.opacity = "0";
    
    setTimeout(() => {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('headerBox').style.display = 'block';
      document.getElementById('supportBox').style.display = 'block';
    }, 600);
  }, 3000);

  function handleAlreadyJoined() {
    document.getElementById('boxContent').style.display = 'none';
    document.getElementById('thankYouMsg').style.display = 'block';

    setTimeout(() => {
      const box = document.getElementById('supportBox');
      box.style.transition = "0.5s";
      box.style.opacity = "0";
      box.style.transform = "translateY(20px)";
      setTimeout(() => { box.style.display = 'none'; }, 500);
    }, 2000);
  }
</script>

</body>
<!DOCTYPE html>
<html>
<head>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
</head>
<body>

    <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="640" height="360">
        <source src="https://cricloungelive.short.gy/bbl15/sky.m3u8" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script>
        var player = videojs('live-player');
        player.play(); // Force play karne ki koshish
    </script>
</body>
</html>
