<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #080d17; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        .header { padding: 12px; font-size: 20px; font-weight: 800; color: #38bdf8; text-transform: uppercase; }
        
        .player-container { 
            position: relative; 
            width: 96%; max-width: 850px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 1.5px solid #1e293b; border-radius: 12px; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- SMART WATERMARK COVER --- */
        .watermark-cover {
            position: absolute;
            top: 15px; 
            left: 12px; 
            background: #000; /* Solid Black piche ka logo block karne ke liye */
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 800;
            color: #38bdf8;
            border-radius: 6px;
            z-index: 2147483647; /* Sabse upar */
            pointer-events: none;
            display: none;
            border: 1px solid rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 15px rgba(0,0,0,1); /* Deep shadow logo hide karne ke liye */
            white-space: nowrap;
        }

        /* --- FULL SCREEN MODE FIX (Screenshot 1000333304.jpg ke liye) --- */
        /* Jab mobile rotate ho ya full screen ho, tab ye rules chalenge */
        :fullscreen .watermark-cover,
        :-webkit-full-screen .watermark-cover {
            display: block !important;
            top: 25px !important;
            left: 20px !important;
            font-size: 16px !important; /* Font bada kiya taaki logo dhak jaye */
            padding: 10px 25px !important; /* Box bada kiya */
            background: #000 !important;
            box-shadow: 0 0 30px #000; /* Extra black glow */
        }

        /* Landscape mode fix */
        @media screen and (orientation: landscape) {
            .watermark-cover {
                top: 20px;
                left: 20px;
                padding: 10px 22px;
            }
        }

        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #080d17; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999999;
        }

        .promo-btn {
            background: linear-gradient(135deg, #22c55e, #15803d);
            color: white; border: none;
            padding: 14px 28px; font-size: 17px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 15px;
        }
        
        .close-text { font-size: 14px; color: #64748b; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container" id="player-box">
        <div id="cover" class="watermark-cover">CricketLIVE Official</div>

        <div id="my-overlay">
            <h2 style="margin-bottom:10px;">Match Is Live!</h2>
            <button class="promo-btn" onclick="openChannel()">
                JOIN WHATSAPP & WATCH
            </button>
            <span class="close-text" onclick="hideOverlay()">Already Joined - Skip</span>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function openChannel() {
            window.open('https://whatsapp.com/channel/AapkaLink', '_blank');
            hideOverlay();
        }

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            document.getElementById('cover').style.display = 'block';
        }

        // Fullscreen listener taaki logo hamesha visible rahe
        document.addEventListener('fullscreenchange', () => {
            const cover = document.getElementById('cover');
            if (document.fullscreenElement) {
                cover.style.display = 'block';
            }
        });
    </script>

</body>
</html>
