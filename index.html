<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      z-index: 9999;
      color: transparent;
      background-image: linear-gradient(90deg, #FFD700, #FF8C00);
      background-clip: text;
      -webkit-background-clip: text;
    }

    .dots::after {
      content: '';
      display: inline-block;
      animation: dots 1.5s steps(3, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
100% { content: '...'; }
    }

    .container {
      display: none;
      padding: 20px;
      background: #080808;
      height: 100vh;
      color: #fff;
    }

    .header {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header img {
      width: 32px;
    }

    .support-box {
      background: #111;
      border: 2px solid #25D366;
      border-radius: 20px;
      padding: 40px 20px;
      max-width: 600px;
      margin: 60px auto;
      text-align: center;
      box-shadow: 0 0 20px #25D36688;
    }

    .support-title {
      font-size: 26px;
      color: #25D366;
      margin-bottom: 15px;
    }

    .support-box p {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .btn {
      padding: 14px 30px;
      margin: 0 10px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-join {
      background: linear-gradient(to right, #25D366, #128C7E);
      color: #fff;
      border: none;
    }

    .btn-joined {
      background: #222;
      color: #bbb;
border: 1px solid #555;
    }
  </style>
</head>
<body>

  <div id="loader">LOADING<span class="dots"></span> PLEASE WAIT</div>

  <div class="container" id="mainContent">
    <div class="header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" />
      CRICKETLIVE! OFFICIAL
    </div>

    <div class="support-box" id="supportBox">
      <div class="support-title">Support Us!</div>
      <p>Join our WhatsApp channel <strong>CricketLIVE! Official</strong> for instant updates and exclusive links.</p>
      <button class="btn btn-joined" onclick="hideSupport()">Already Joined</button>
      <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="btn btn-join">Join Now</a>
    </div>
  </div>

  <script>
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
      }, 3000);
    }

    function hideSupport() {
      document.getElementById('supportBox').style.display = 'none';
    }
  </script>

</body>
</html>
