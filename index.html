<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(rgba(11, 19, 43, 0.85), rgba(11, 19, 43, 0.85)), 
                  url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #loadingScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem; /* Mobile optimized size */
      text-align: center;
      color: #00f0ff;
      font-family: 'Orbitron', sans-serif;
      width: 100%;
    }

    #loadingScreen::after {
      content: '...';
      animation: dots 1.5s infinite steps(3);
    }

    @keyframes dots {
      0% { content: '';}
      33% { content: '.';}
      66% { content: '..';}
      100% { content: '...';}
    }

    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; /* Mobile optimized size */
      background: linear-gradient(90deg, #00f0ff, #ff00f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: none;
      z-index: 10;
      white-space: nowrap;
      width: max-content;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    /* Mobile Responsive Support Box */
    #supportBox {
      display: none;
      position: absolute;
      /* Mobile coordinates fix */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; /* Har mobile screen par fit hone ke liye */
      max-width: 400px; /* Mobile width cap */
      background: rgba(28, 28, 60, 0.95);
      border: 2px solid #25D366;
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 255, 150, 0.3);
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(15px);
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
