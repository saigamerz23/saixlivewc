<!DOCTYPE html>
<html>
  <head>
    <title>HLS Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  </head>
  <body style="background:#000; text-align:center;">

    <video id="video" controls autoplay width="90%" height="auto"></video>

    <script>
      var video = document.getElementById('video');
      var videoSrc = 'https://in-mc-fdlive.fancode.com/mumbai/138736_english_hls_b32ae9a2cf65677_1ta-di_h264/index.m3u8';

      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function () {
          video.play();
        });
      }
    </script>

  </body>
