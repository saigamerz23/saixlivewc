<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        .header { padding: 15px; font-size: 22px; font-weight: bold; color: #38bdf8; }
        
        .player-container { 
            position: relative; 
            width: 95%; max-width: 800px; margin: 20px auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #334155; border-radius: 10px; overflow: hidden; 
        }

        iframe { width: 100%; height: 100%; border: none; display: none; } /* Pehle hidden rahega */

        /* --- AAPKA POPUP LAYER --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 12px 25px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }
        
        .close-text { font-size: 13px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container">
        <div id="my-overlay">
            <h2 style="margin-bottom:10px;">Match Live Ho Gaya Hai!</h2>
            <p style="font-size: 14px; color: #cbd5e1; margin-bottom: 20px;">Match dekhne ke liye join karein</p>
            
            <button class="promo-btn" onclick="joinAndPlay()">
                JOIN WHATSAPP & WATCH
            </button>
            
            <span class="close-text" onclick="startPlayer()">Already Joined (Skip)</span>
        </div>

        <iframe id="main-player" 
                src="" 
                allow="autoplay; encrypted-media; fullscreen" 
                referrerpolicy="no-referrer"
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        const overlay = document.getElementById('my-overlay');

        // Jab user Join karega
        function joinAndPlay() {
            window.open('https://whatsapp.com/channel/AapkaLink', '_blank');
            startPlayer();
        }

        // Ye function player ko start karega aur popup hatayega
        function startPlayer() {
            overlay.style.display = 'none'; // Aapka popup hat gaya
            player.style.display = 'block'; // Iframe dikhne laga
            player.src = "https://momixtv.pages.dev/?id=" + vid; // Ab stream load hogi
        }
    </script>

</body>
</html>
