<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            background-color: #050810; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
        }

        .site-header {
            padding: 15px 0;
            background: linear-gradient(to bottom, #0f172a, #050810);
            border-bottom: 1px solid #1e293b;
            margin-bottom: 10px;
        }
        .site-header h1 {
            margin: 0;
            font-size: 24px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .site-header span { color: #38bdf8; }
        
        /* Video Container - Isko fullscreen karenge */
        .player-container { 
            position: relative; 
            width: 98%; 
            max-width: 850px; 
            margin: 10px auto; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid #1e293b;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* --- LOGO POSITION FIXED --- */
        #cover {
            position: absolute;
            top: 22px;          /* Thoda niche kiya hai cover karne ke liye */
            left: 18px;         /* Thoda right kiya hai */
            background: #000;   /* Solid Black to hide Momix */
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 800;
            color: #38bdf8;
            border-radius: 4px;
            z-index: 2147483647; 
            pointer-events: none;
            display: none;
            border: 1.5px solid #38bdf8;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0,0,0,1); /* Dark shadow taaki niche ka kuch na dikhe */
        }

        /* Fullscreen Rules */
        .player-container:fullscreen { width: 100vw; height: 100vh; max-width: none; border-radius: 0; }
        .player-container:fullscreen #cover { 
            display: block !important; 
            top: 5%; left: 3%; 
            font-size: 20px; 
            padding: 10px 20px;
        }

        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #080d17; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 12px 25px; font-size: 16px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <h1>CricketLIVE <span>Official</span></h1>
    </header>

    <div class="player-container" id="main-video-wrapper">
        <div id="cover">CricketLIVE Official</div>

        <div id="my-overlay">
            <button class="promo-btn" onclick="hideOverlay()">WATCH LIVE MATCH</button>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        const wrapper = document.getElementById('main-video-wrapper');
        const watermark = document.getElementById('cover');
        
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            watermark.style.display = 'block';
        }

        /* --- FORCE WRAPPER FULLSCREEN --- */
        /* Jab user player ke button par click karega, 
           hum pure box ko fullscreen kar denge taaki logo zinda rahe */
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                // Exit fullscreen hone par style reset
            }
        });

        // Mobile rotation aur auto-fullscreen ke liye detection
        player.addEventListener('webkitfullscreenchange', function() {
            if (document.webkitFullscreenElement === player) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                }
            }
        });
    </script>

</body>
</html>
