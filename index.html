<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1e40;
      background-image: linear-gradient(rgba(10, 30, 64, 0.9), rgba(10, 30, 64, 0.9)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative; /* For audio element positioning */
    }

    /* Animated Loading Screen */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #0a1e40;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #00ffff;
      letter-spacing: 5px;
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }

    /* Header with Premium Box */
    header {
      width: 90%; /* Max width for mobile */
      max-width: 400px; /* Limit for larger screens */
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      margin-top: 25px;
      white-space: nowrap;
      padding: 10px 15px; /* Padding inside the box */
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.08); /* Semi-transparent background */
      backdrop-filter: blur(15px); /* Glassmorphism effect */
      border: 1px solid rgba(255, 255, 255, 0.2); /* Light border */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); /* Deep shadow for luxury */
      display: none; /* Initially hidden */
      z-index: 100; /* Above other content */
      position: relative; /* For internal text gradient */
      overflow: hidden; /* For smooth text gradient */
    }

    /* Header text styling within the premium box */
    .header-text-content {
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
      text-shadow: 0 0 10px rgba(0,255,255,0.4); /* Glow effect for text */
    }

    /* Support Box */
    #supportBox {
      display: none;
      width: 90%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 30px 20px;
      margin-top: 50px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      animation: slideUp 0.6s ease-out;
      z-index: 101; /* Above header box */
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .box-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #25D366;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .box-title img { width: 30px; height: 30px; }

    .box-desc {
      font-size: 0.95rem;
      color: #efefef;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .join-btn {
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
      animation: pulseGlow 2s infinite;
      display: block;
      transition: all 0.3s ease;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 20px 10px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    .already-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .already-btn:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    /* Thank You Message */
    #thankYouMsg {
      display: none;
      font-size: 1.2rem;
      color: #00ffff;
      margin-top: 20px;
      animation: fadeIn 0.5s ease;
      font-family: 'Orbitron', sans-serif; /* Premium font for thank you */
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Hidden audio element */
    #commentaryAudio {
        display: none;
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="loader-text">LOADING...</div>
  </div>

  <header id="headerBox">
    <div class="header-text-content">CRICKETLIVE! OFFICIAL</div>
  </header>

  <div id="supportBox">
    <div id="boxContent">
      <div class="box-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        Support Us!
      </div>
      <p class="box-desc">
        Join our WhatsApp channel <strong>CricketLIVE! Official</strong> 
        For Instant Update & Exclusive Links.
      </p>
      
      <div class="button-group">
        <a href="https://whatsapp.com/channel/your-link" class="join-btn" target="_blank">JOIN</a>
        <button class="already-btn" onclick="handleAlreadyJoined()">Already Joined</button>
      </div>
    </div>
    
    <div id="thankYouMsg">❤️ Thank You for your Support!</div>
  </div>

  <audio id="commentaryAudio" preload="auto">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARJxAAABJAAgAZGF0YQAAAAA=" type="audio/wav">
  </audio>

<script>
  const loadingScreen = document.getElementById('loadingScreen');
  const headerBox = document.getElementById('headerBox');
  const supportBox = document.getElementById('supportBox');
  const commentaryAudio = document.getElementById('commentaryAudio');

  // Load and play commentary after loading screen (if supported by browser)
  // Auto-play might be blocked by browsers, a user interaction might be needed.
  // For this example, we'll try to play it after loading.
  function playCommentary() {
      if (commentaryAudio && commentaryAudio.paused) {
          commentaryAudio.play().catch(e => console.log("Audio play blocked:", e));
      }
  }

  // Loading for exactly 3 seconds
  setTimeout(() => {
    loadingScreen.style.display = 'none';
    headerBox.style.display = 'block';
    supportBox.style.display = 'block';
    playCommentary(); // Attempt to play commentary after loading
  }, 3000);

  function handleAlreadyJoined() {
    // Hide content and show Thank You
    document.getElementById('boxContent').style.display = 'none';
    document.getElementById('thankYouMsg').style.display = 'block';

    // Hide the whole box after 2 seconds of showing Thank You
    setTimeout(() => {
      supportBox.style.transition = "0.5s";
      supportBox.style.opacity = "0";
      supportBox.style.transform = "scale(0.9)";
      setTimeout(() => {
        supportBox.style.display = 'none';
      }, 500);
    }, 2000);
  }
</script>

</body>
</html>
<source src="https://example.com/your-amazing-commentary.mp3" type="audio/mpeg">
