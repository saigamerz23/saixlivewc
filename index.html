<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&family=Playfair+Display:ital,wght@1,700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a18;
      background-image: linear-gradient(rgba(5, 10, 24, 0.9), rgba(5, 10, 24, 0.9)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* Premium Loading Screen */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #050a18;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .welcome-text {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      font-style: italic;
      animation: fadeInOut 2s infinite ease-in-out;
    }

    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: #00ffff;
      letter-spacing: 8px;
      opacity: 0.8;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.6; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-5px); }
    }

    /* Luxury Header Box */
    header {
      width: 92%;
      max-width: 420px;
      text-align: center;
      margin-top: 35px;
      padding: 15px;
      position: relative;
      display: none;
      z-index: 100;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border-radius: 15px;
      /* Luxury Border */
      border: 1px solid rgba(191, 149, 63, 0.4); 
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), inset 0 0 15px rgba(191, 149, 63, 0.1);
    }

    .header-text-content {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 1px;
      white-space: nowrap;
      background: linear-gradient(90deg, #fff, #00ffff, #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    /* Support Box Premium */
    #supportBox {
      display: none;
      width: 90%;
      max-width: 380px;
      background: rgba(10, 20, 40, 0.8);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 35px 25px;
      margin-top: 40px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8);
      animation: luxuryPop 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    @keyframes luxuryPop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .box-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #25D366;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .box-title img { width: 32px; }

    .box-desc {
      font-size: 0.9rem;
      color: #d1d1d1;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .join-btn {
      background: linear-gradient(45deg, #25D366, #128C7E);
      color: white;
      text-decoration: none;
      padding: 16px;
      border-radius: 15px;
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
      box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
      transition: 0.3s;
    }

    .already-btn {
      background: transparent;
      color: #888;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    #thankYouMsg {
      display: none;
      font-size: 1.3rem;
      font-family: 'Playfair Display', serif;
      color: #fcf6ba;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="welcome-text">Welcome</div>
    <div class="loader-text">LOADING...</div>
  </div>

  <header id="headerBox">
    <div class="header-text-content">CRICKETLIVE! OFFICIAL</div>
  </header>

  <div id="supportBox">
    <div id="boxContent">
      <div class="box-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        Support Us!
      </div>
      <p class="box-desc">
        Join our WhatsApp channel <strong>CricketLIVE! Official</strong> 
        For Instant Update & Exclusive Links.
      </p>
      
      <div class="button-group">
        <a href="https://whatsapp.com/channel/your-link" class="join-btn" target="_blank">JOIN</a>
        <button class="already-btn" onclick="handleAlreadyJoined()">Already Joined</button>
      </div>
    </div>
    
    <div id="thankYouMsg">✨ Thank You for your Support!</div>
  </div>

<script>
  // Loading timer: 3 Seconds
  setTimeout(() => {
    document.getElementById('loadingScreen').style.transition = "0.8s";
    document.getElementById('loadingScreen').style.opacity = "0";
    
    setTimeout(() => {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('headerBox').style.display = 'block';
      document.getElementById('supportBox').style.display = 'block';
    }, 800);
  }, 3000);

  function handleAlreadyJoined() {
    document.getElementById('boxContent').style.display = 'none';
    document.getElementById('thankYouMsg').style.display = 'block';

    setTimeout(() => {
      const box = document.getElementById('supportBox');
      box.style.transition = "0.6s";
      box.style.opacity = "0";
      box.style.transform = "translateY(20px)";
      setTimeout(() => { box.style.display = 'none'; }, 600);
    }, 2000);
  }
</script>

</body>
</html>
