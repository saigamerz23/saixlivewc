            -webkit-text-fill-color: transparent;

            text-transform: uppercase;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        /* --- VIDEO CONTAINER --- */
        .player-container { 
            position: relative; 
            width: 96%; 
            max-width: 850px; 
            margin: 10px auto;

            background: #000; 
            border-radius: 20px;

        .quality-container {

        }

        .quality-btn {
            position: relative;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #00d2ff;
            text-decoration: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .quality-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
        }

        /* HD Tag for 720p and 1080p */
        .hd-tag {
            font-size: 10px;
            background: #ff416c;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 5px;
        }

        /* --- WHATSAPP POPUP --- */
        #wp-popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 2147483647;
            backdrop-filter: blur(15px);
        }
        .wp-popup-content {
            background: #0f172a; padding: 40px 30px; border-radius: 35px;
            width: 85%; max-width: 320px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .wp-logo {
            width: 60px; height: 60px; background: #25D366; margin: 0 auto 20px;

        }

            border-radius: 15px; margin-top: 20px; text-transform: uppercase;
        }
        .already-joined {

            font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        #my-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050810; display: flex; justify-content: center; 
            align-items: center; z-index: 10000;

            background: #22c55e; color: white; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: 900; border-radius: 50px; cursor: pointer;

</head>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        const wrapper = document.getElementById('main-video-wrapper');
        const popup = document.getElementById('wp-popup-overlay');
        
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        window.onload = function() {
            if (localStorage.getItem('wp_joined') === 'true') {
                popup.style.display = 'none';
            }
        }

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
        }

        function closePopup() {
            popup.style.display = 'none';
            localStorage.setItem('wp_joined', 'true');
        }

        function handleFS() {
            if (document.fullscreenElement === player || document.webkitFullscreenElement === player) {
                if (wrapper.requestFullscreen) { wrapper.requestFullscreen(); } 
                else if (wrapper.webkitRequestFullscreen) { wrapper.webkitRequestFullscreen(); }
            }
        }
        player.addEventListener('webkitfullscreenchange', handleFS);
        player.addEventListener('fullscreenchange', handleFS);
