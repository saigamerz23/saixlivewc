<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CRICKETLIVE! OFFICIAL</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
    .title {
      font-size: 80px; /* Bigger text size */
      font-weight: 900; /* Extra bold */
      font-style: italic;
      line-height: 1.3; /* Increased line/height spacing */
      background: linear-gradient(to right, #00bfff, #ff00cc);
      -webkit-background-clip: text;
      color: transparent;
      margin: 40px 0 20px 0;
      letter-spacing: 2px; /* Extra spacing */
      text-transform: uppercase;
    }
    video {
      width: 100%;
      height: auto;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="title">CRICKETLIVE!<br>OFFICIAL</div>

  <video id="video" controls autoplay muted></video>

  <script>
    // Auto-open WhatsApp Channel
    setTimeout(function () {window.open("https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q", "_blank");
    }, 500);

    // Stream Load Logic
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const links = {
      "Star1HindiHD": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
    };

    const videoSrc = links[id];

    if (Hls.isSupported() && videoSrc) {
      const video = document.getElementById('video');
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
    } else {
      document.body.innerHTML += "<p style='color:white;'>Channel not found or not supported.</p>";
    }
  </script>

</body>
</html>
