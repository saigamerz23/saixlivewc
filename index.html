        else if (slug === 'fox_cricket' || slug === 'hotstar_live') { cropClass = 'class="fox-crop"'; }

        else if (slug === 'prime_live' || slug === 'sa20_live' || slug === 'willow_ios') { cropClass = 'class="prime-sa20-fix"'; } 
        else { cropClass = 'class="standard-crop"'; }
        
        container.innerHTML = `<iframe id="main-player" ${cropClass} src="${channels[slug]}" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; encrypted-media; fullscreen" scrolling="no" onload="hideSkeleton()"></iframe>`;
        
        showUIParts();
        document.getElementById('watermark').style.display = 'inline-block';
        document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hideSkeleton() { document.getElementById('loading-skeleton').style.display = 'none'; }
    function showUIParts() { if (currentChannel && popupClosed) { document.getElementById('live-signal-box').style.display = 'flex'; document.getElementById('reaction-bar').style.display = 'flex'; } }
    function closePopup() { document.getElementById('entry-popup').style.display = 'none'; popupClosed = true; showUIParts(); }
    function react(emoji) { const el = document.createElement('div'); el.className = 'floating-emoji'; el.innerText = emoji; el.style.left = (Math.random() * 60 + 20) + '%'; document.body.appendChild(el); setTimeout(() => el.remove(), 2000); }
    function copyShareMessage() { const linkText = document.getElementById('sharePreview').innerText; navigator.clipboard.writeText(linkText); document.getElementById('copyBtn').innerText = "DONE!"; setTimeout(() => { document.getElementById('copyBtn').innerText = "COPY"; }, 2000); }
    function whatsappShare() { const linkText = document.getElementById('sharePreview').innerText; if(currentChannel) { window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(linkText), '_blank'); } else { alert("Pehle koi channel select karein!"); } }

    window.onload = function() {
        const ch = new URLSearchParams(window.location.search).get('ch');
        document.getElementById('entry-popup').style.display = 'flex';
        if (ch && channels[ch]) {
            loadMatch(ch);
            document.getElementById('site-header').classList.add('hidden-mode');
            document.getElementById('share-header').style.display = 'block';
            document.getElementById('main-grid').classList.add('hidden-mode');
            document.getElementById('view-all-btn').style.display = 'block';
        }
    };
</script>
</body>
</html>
