<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricketLIVE! Official - Full Screen Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 40px; }
        
        .header { padding: 15px 10px; background: #0f172a; border-bottom: 2px solid #1e293b; }
        .header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 20px; margin: 0; }

        /* Video Wrapper */
        .video-wrapper {
            width: 95%;
            max-width: 850px;
            margin: 15px auto;
            background: #000;
            border: 2px solid #00d2ff;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 0;
        }

        /* Full Screen Button */
        .fs-button {
            background: linear-gradient(45deg, #00d2ff, #0072ff);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            text-transform: uppercase;
        }

        /* Information Box Styles */
        .info-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #1e293b;
            border-radius: 15px;
            max-width: 400px;
            margin: 25px auto;
            padding: 20px;
            text-align: left;
        }

        .info-box h3 {
            color: #00d2ff;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .info-box p {
            font-size: 13px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 400px; margin: 10px auto; padding: 0 20px; }
        .btn-wa { background: #25D366; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }

        /* Popup */
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .pop-box { background: #0f172a; padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; border: 1px solid #00d2ff; }
        .join-btn { background: #25D366; color: white; display: block; padding: 15px; border-radius: 10px; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body onload="checkPopup()">

    <div id="entry-popup">
        <div class="pop-box">
            <h2 style="font-family:'Orbitron'; color:#00d2ff; font-size:20px;">IMPORTANT!</h2>
            <p style="font-size:14px;">Fast Updates ke liye Join Karein</p>
            <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="join-btn" onclick="closePopup()">JOIN WHATSAPP</a>
            <div style="margin-top:15px; cursor:pointer; font-size:12px; text-decoration:underline;" onclick="closePopup()">CONTINUE TO STREAM</div>
        </div>
    </div>

    <header class="header">
        <h1>CricketLIVE! Official</h1>
    </header>

    <div class="video-wrapper" id="videoArea">
        <div class="video-container">
            <iframe 
                id="livePlayer"
                src="https://cinearena.github.io/id/sports.html?id=Star2khel" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
    
    <button class="fs-button" onclick="goFullScreen()">CLICK FOR FULL SCREEN</button>

    <div class="info-box">
        <h3>Stay Updated!</h3>
        <p>Never miss a moment! Join our WhatsApp channel for <b>Real-time Match Updates</b>, <b>Exclusive Highlights</b>, and <b>Live Streaming Links</b> delivered directly to your phone.</p>
        <div class="grid" style="padding: 0; margin: 0;">
            <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="btn-wa">JOIN WHATSAPP CHANNEL</a>
        </div>
    </div>

    <script>
        function checkPopup() { document.getElementById('entry-popup').style.display = 'flex'; }
        function closePopup() { document.getElementById('entry-popup').style.display = 'none'; }

        function goFullScreen() {
            var el = document.getElementById('videoArea');
            if (el.requestFullscreen) { el.requestFullscreen(); } 
            else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); } 
            else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
        }
    </script>
</body>
</html>
