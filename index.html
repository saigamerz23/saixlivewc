<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRICKETLIVE! OFFICIAL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 20px; overflow-x: hidden; }
        
        /* POPUP */
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 16, 0.9); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .pop-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        .support-text { font-family: 'Bebas Neue', cursive; font-size: 32px; color: #00d2ff; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        .pop-btn { padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; color: white; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }

        /* SIDEBAR */
        .floating-sidebar { position: fixed; left: 10px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .sidebar-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; text-decoration: none; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .sidebar-wp { background: rgba(37, 211, 102, 0.8); }
        .sidebar-tg { background: rgba(0, 136, 204, 0.8); }

        .header { padding: 15px 10px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .header h1, .share-header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; margin: 0; }
        .share-header { display: none; padding: 15px 10px; }

        /* PULSE LIVE SIGNAL */
        #live-signal-box { display: none; justify-content: flex-end; width: 96%; max-width: 850px; margin: 10px auto -15px auto; position: relative; z-index: 10; }
        #live-signal { background: rgba(255, 0, 0, 0.8); padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); display: flex; align-items: center; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .red-dot { height: 8px; width: 8px; background-color: #fff; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }

        /* VIDEO WRAPPER & CYBER FRAME */
        .video-wrapper { 
            width: 96%; max-width: 850px; margin: 20px auto; background: #000; border: 1px solid rgba(0, 210, 255, 0.5); 
            border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .share-mode-active .video-wrapper {
            outline: 4px solid #00d2ff;
            outline-offset: -2px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6), 0 0 50px rgba(249, 168, 212, 0.3);
            border: 2px solid #f9a8d4;
            animation: cyber-glow 3s linear infinite;
        }
        @keyframes cyber-glow { 0%, 100% { outline-color: #00d2ff; } 50% { outline-color: #f9a8d4; } }

        #main-player { width: 100%; height: 100%; border: 0; position: absolute; left: 0; z-index: 1; transform-origin: top center; transition: opacity 0.5s; }
        
        /* CROPS (UNTOUCHED) */
        .fox-crop { height: 175% !important; top: -65% !important; transform: scale(1.02); }
        .criclife-crop { height: 180% !important; top: -63% !important; transform: scale(1.03); }
        .standard-crop { height: 160% !important; top: -35% !important; transform: scale(1.05); }
        .prime-sa20-fix { height: 170% !important; top: -50% !important; transform: scale(1.05); }
        .fixed-controls { height: 100% !important; top: 0 !important; transform: scale(1) !important; }

        /* CUSTOM LOADER */
        .skeleton { 
            width: 100%; height: 100%; background: #050810; display: none; position: absolute; top: 0; left: 0; z-index: 5; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        .loader-spin { width: 40px; height: 40px; border: 3px solid rgba(0,210,255,0.2); border-top: 3px solid #00d2ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODERN OFFLINE UI */
        .offline-ui { width: 100%; height: 100%; background: radial-gradient(circle, #1e293b 0%, #050810 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #64748b; }

        #watermark { position: absolute; top: 8px; left: 8px; z-index: 10; font-family: 'Orbitron', sans-serif; font-size: 8px; color: #ffffff; background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 4px; display: none; text-transform: uppercase; pointer-events: none; }

        /* REACTION BAR (FROSTED GLASS) */
        .reaction-bar { display: none; justify-content: center; gap: 12px; margin: 15px auto; transition: 0.3s; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); width: fit-content; }
        .react-btn { font-size: 24px; cursor: pointer; transition: 0.2s; padding: 8px; display: flex; align-items: center; justify-content: center; }
        .react-btn:active { transform: scale(0.8); }
        
        .floating-emoji { position: fixed; bottom: 100px; left: 50%; pointer-events: none; font-size: 35px; z-index: 10000; animation: popBounce 2s forwards; }
        @keyframes popBounce { 0% { transform: translateY(0) scale(0); opacity: 0; } 15% { transform: translateY(-30px) scale(1.5); opacity: 1; } 100% { transform: translateY(-400px); opacity: 0; } }

        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; max-width: 94%; }
        .channel-button { border: none; padding: 12px 5px; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: white; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.3); transition: 0.2s; }
        
        .fox501-btn { background: linear-gradient(45deg, #00c6ff, #0072ff) !important; color: #fff !important; grid-column: span 2; font-size: 14px; border: 1px solid #fff !important; }
        .cricbuzz-btn { background: linear-gradient(45deg, #1d976c, #93f9b9) !important; color: #000 !important; grid-column: span 2; font-size: 14px; border: 1px solid #fff !important; }
        .hotstar-btn { background: linear-gradient(45deg, #001524, #004e92) !important; color: #fff !important; grid-column: span 2; font-size: 14px; border: 1px solid #00d2ff !important; }

        .social-container { display: flex; flex-direction: column; gap: 10px; align-items: center; margin: 15px auto; width: 90%; max-width: 420px; }
        .join-btn-base { width: 100%; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; transition: 0.3s; }
        .join-wp { background: rgba(37, 211, 102, 0.15); border: 1px solid #25D366; }
        .join-tg { background: rgba(0, 136, 204, 0.15); border: 1px solid #0088cc; }

        .hidden-mode { display: none !important; }
        #view-all-btn { display: none; margin: 10px auto; background: #ffffff; color: #000; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 12px; width: fit-content; border: 2px solid #00d2ff; }
    </style>
</head>

<div style="display: flex; align-items: center; justify-content: center; gap: 5px; margin: 15px auto; width: 94%;">

    <button class="copy-btn" id="copyBtn" onclick="copyShareMessage()" style="background: #00d2ff; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;">COPY</button>

</div>

<script>
    const channels = {
        'fox_501': 'https://teamroiframe07.pages.dev/',
        'cricbuzz_1': 'https://paste.fledding.com/~Willo.html',
        'cricbuzz_2': 'https://teamrocricbuzz2.pages.dev/',
        'sony_liv': 'https://crickettv.site/sonyliv/sonyliv-1',
        'sony_liv_2': 'https://crickettv.site/sonyliv/sonyliv-5',
        'prime_event': 'https://crickettv.site/world-sports/player?id=prime-tv',
        'fancode': 'https://teamrofemcodeplyr2.pages.dev/match.html?id=138757&cdn=fancode_cdn',
        'hotstar_live': 'https://run-machine.pages.dev/?id=hindi',
        'fox_cricket': 'https://match-central.pages.dev/?id=fox',
        'wpl_live': 'https://teamrohittry2.pages.dev/',
        'criclife': 'https://run-machine.pages.dev/?id=willow',
        'sa20_live': 'https://skcricweb.pages.dev/ipel?id=sa20',
        'willow_ios': 'https://skcricweb.pages.dev/ipel?id=willowios',
        'prime_live': 'https://edlios.pages.dev/edid?id=u19',
        'ss2sd': 'https://insiderlivehd.pages.dev/English',
        'ss2hd': 'https://insiderlivehd.pages.dev/Fox',
        'tnt1': 'https://crickettv.site/world-sports/player?id=tnt-sports-1',
        'willow': 'https://wlo-cricstreamiing.pages.dev/'
    };

    let currentChannel = null;
    let popupClosed = false;

    function loadMatch(slug) {
        currentChannel = slug;
        const container = document.getElementById('player-container');
        document.getElementById('loading-skeleton').style.display = 'flex';
        
        let cropClass = '';
        if (['willow', 'cricbuzz_1', 'cricbuzz_2', 'sony_liv', 'sony_liv_2', 'fancode', 'ss2sd', 'tnt1', 'prime_event'].includes(slug)) {
            cropClass = 'class="fixed-controls"';
        } 
        else if (slug === 'fox_cricket' || slug === 'hotstar_live') { cropClass = 'class="fox-crop"'; } 
        else if (slug === 'criclife') { cropClass = 'class="criclife-crop"'; } 
        else if (slug === 'prime_live' || slug === 'sa20_live' || slug === 'willow_ios') { cropClass = 'class="prime-sa20-fix"'; } 
        else { cropClass = 'class="standard-crop"'; }
        
        container.innerHTML = `<iframe id="main-player" ${cropClass} src="${channels[slug]}" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; encrypted-media; fullscreen" scrolling="no" onload="hideSkeleton()"></iframe>`;
        
        showUIParts();
        document.getElementById('watermark').style.display = 'inline-block';
        document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
    }

    function hideSkeleton() { document.getElementById('loading-skeleton').style.display = 'none'; }
    
    function showUIParts() { 
        if (currentChannel && popupClosed) { 
            document.getElementById('live-signal-box').style.display = 'flex'; 
            document.getElementById('reaction-bar').style.display = 'flex'; 
        } 
    }

    function closePopup() { 
        document.getElementById('entry-popup').style.display = 'none'; 
        popupClosed = true; 
        showUIParts(); 
    }

    function react(emoji) { 
        const el = document.createElement('div'); 
        el.className = 'floating-emoji'; 
        el.innerText = emoji; 
        el.style.left = (Math.random() * 60 + 20) + '%'; 
        document.body.appendChild(el); 
        setTimeout(() => el.remove(), 2000); 
    }

    function copyShareMessage() { 
        const linkText = document.getElementById('sharePreview').innerText; 
        navigator.clipboard.writeText(linkText); 
        document.getElementById('copyBtn').innerText = "DONE!"; 
        setTimeout(() => { document.getElementById('copyBtn').innerText = "COPY"; }, 2000); 
    }

    window.onload = function() {
        const ch = new URLSearchParams(window.location.search).get('ch');
        document.getElementById('entry-popup').style.display = 'flex';
        if (ch && channels[ch]) {
            document.body.classList.add('share-mode-active');
            loadMatch(ch);
            document.getElementById('site-header').classList.add('hidden-mode');
            document.getElementById('share-header').style.display = 'block';
            document.getElementById('main-grid').classList.add('hidden-mode');
            document.getElementById('view-all-btn').style.display = 'block';
        }
    };
</script>
