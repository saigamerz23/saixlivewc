<script>
  // 1. Loading & Show Content
  setTimeout(() => {
    document.getElementById('loadingScreen').style.opacity = "0";
    setTimeout(() => {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('headerBox').style.display = 'block';
      document.getElementById('playerContainer').style.display = 'block';
      document.getElementById('supportBox').style.display = 'block';
      startPlayer();
    }, 600);
  }, 3000);

  // 2. Already Joined Logic
  function handleAlreadyJoined() {
    document.getElementById('boxContent').style.display = 'none';
    document.getElementById('thankYouMsg').style.display = 'block';
    setTimeout(() => {
      const box = document.getElementById('supportBox');
      box.style.transition = "0.5s"; box.style.opacity = "0";
      setTimeout(() => { box.style.display = 'none'; }, 500);
    }, 2000);
  }

  // 3. Fixed Player Logic
  function startPlayer() {
    var video = document.getElementById('video');
    var status = document.getElementById('streamStatus');
    
    // Testing ke liye MP4 link (Bina Proxy ke)
    var videoUrl = 'https://www.w3schools.com/html/mov_bbb.mp4';
    
    // Check if it's HLS (.m3u8) or Normal Video (.mp4)
    if (videoUrl.includes('.m3u8')) {
        if (Hls.isSupported()) {
          var hls = new Hls();
          hls.loadSource(videoUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
            status.innerText = "STREAMING LIVE - HLS MODE";
          });
        }
    } else {
        // Normal MP4 play karne ke liye
        video.src = videoUrl;
        video.play().catch(e => console.log("Autoplay blocked, user interaction needed"));
        status.innerText = "STREAMING LIVE - MP4 MODE";
    }
  }
</script>
