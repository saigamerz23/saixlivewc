<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CricketLIVE! Official</title>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
    }

    .title {
      font-size: 60px;
      font-weight: bold;
      background: linear-gradient(to right, #00bfff, #ff00cc);
      -webkit-background-clip: text;
      color: transparent;
      margin-top: 30px;
      text-transform: uppercase;
    }

    .support-box {
      position: relative;
      background: #111;
      border: 3px solid #25D366;
      border-radius: 18px;
      display: inline-block;
      padding: 40px;
      margin-top: 50px;
      width: 92%;
      max-width: 550px;
      box-shadow: 0 0 25px #25D36688;
      animation: slideIn 1.2s ease-out;
    }

    .support-box h2 {
      font-size: 30px;
      margin-bottom: 15px;
      color: #25D366;
      display: flex;
      align-items: center;
justify-content: center;
      gap: 12px;
    }

    .support-box h2 img {
      width: 32px;
      height: 32px;
      animation: rotate 2s linear infinite;
    }

    .support-box p {
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .join-btn {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      padding: 16px 40px;
      font-size: 19px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.4s ease;
      animation: pulse 2s infinite;
    }

    .join-btn:hover {
      transform: scale(1.06);
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 26px;
      color: #888;
      cursor: pointer;
    }

    .close-btn:hover {
      color: #fff;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rotate {
      0% { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
    }
  </style>
</head>
<body><div class="title">CRICKETLIVE! OFFICIAL</div>

  <div class="support-box" id="supportBox">
    <div class="close-btn" onclick="document.getElementById('supportBox').style.display='none';">×</div>
    <h2>
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">Support Us!
    </h2>
    <p>
      Join our WhatsApp channel <strong>CricketLIVE! Official</strong><br>
      for Instant Updates, Exclusive Match Links & More.
    </p>
    <a class="join-btn" href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank">Join Now</a>
  </div>

</body>
</html>
