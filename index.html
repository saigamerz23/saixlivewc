<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #080d17; color: white; font-family: sans-serif; text-align: center; }
        
        /* Container jo full screen hoga */
        .player-container { 
            position: relative; 
            width: 96%; max-width: 850px; margin: 20px auto; aspect-ratio: 16/9; 
            background: #000; border-radius: 12px; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- PREMIUM TAG --- */
        .watermark-cover {
            position: absolute;
            top: 25px; 
            left: 20px; 
            background: #000;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 800;
            color: #38bdf8;
            border-radius: 6px;
            z-index: 2147483647; 
            pointer-events: none;
            display: none;
            border: 1.5px solid rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 20px #000;
            text-transform: uppercase;
        }

        /* Fullscreen CSS: Jab pura container bada hoga tab tag ki position */
        .player-container:fullscreen .watermark-cover {
            display: block !important;
            top: 30px !important;
            left: 25px !important;
            font-size: 18px !important;
            padding: 10px 25px !important;
        }
        
        .player-container:-webkit-full-screen .watermark-cover {
            display: block !important;
            top: 30px !important;
            left: 25px !important;
        }

        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #080d17; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999999;
        }

        .promo-btn {
            background: #22c55e; color: white; border: none;
            padding: 14px 28px; font-size: 17px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="player-container" id="main-video-wrapper">
        <div id="cover" class="watermark-cover">CricketLIVE Official</div>

        <div id="my-overlay">
            <button class="promo-btn" onclick="hideOverlay()">WATCH LIVE MATCH</button>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        const wrapper = document.getElementById('main-video-wrapper');
        
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            document.getElementById('cover').style.display = 'block';
        }

        // --- Sabse Important Part ---
        // Jab user player ke fullscreen button par click karega, 
        // hum pure container (wrapper) ko fullscreen karenge taaki logo saath jaye.
        
        player.addEventListener('fullscreenchange', handleFS);
        player.addEventListener('webkitfullscreenchange', handleFS);

        function handleFS() {
            if (document.fullscreenElement === player || document.webkitFullscreenElement === player) {
                // Iframe ke bajaye pure box ko fullscreen kar do
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                }
            }
        }
    </script>

</body>
</html>
