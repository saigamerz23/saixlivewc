<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRICKETLIVE! OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 20px; overflow-x: hidden; }
        
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 16, 0.98); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .pop-box { background: #111827; padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; border: 2px solid #00d2ff; }
        .support-text { font-family: 'Bebas Neue', cursive; font-size: 32px; color: #00d2ff; letter-spacing: 2px; margin-bottom: 15px; }
        .pop-btn { padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-bottom: 10px; color: white; font-size: 13px; }

        .header { padding: 15px 10px; background: #0f172a; }
        .header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; margin: 0; }

        .video-wrapper { 
            width: 96%; 
            max-width: 850px; 
            margin: 20px auto; 
            background: #000; 
            border: 2px solid #00d2ff; 
            border-radius: 12px; 
            overflow: hidden; 
            aspect-ratio: 16 / 9; 
            position: relative;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        #main-player { 
            width: 100%; 
            height: 100%;
            border: 0; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1;
            will-change: transform;
        }

        .extreme-crop { 
            height: 160% !important; 
            top: -30% !important;
            transform: scale(1.05); 
        }

        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; max-width: 94%; }
        .channel-button { border: none; padding: 12px 5px; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: white; background: linear-gradient(45deg, #1e293b, #334155); border: 1px solid #00d2ff; }
        
        .wpl-btn { background: linear-gradient(45deg, #ff0080, #7928ca) !important; color: #fff !important; grid-column: span 2; font-size: 14px; border: 2px solid #fff; }
        .sa20-btn { background: linear-gradient(45deg, #f9a8d4, #00d2ff) !important; color: #000 !important; font-size: 11px; }
        .khel-btn { background: linear-gradient(45deg, #ed1c24, #2e3192) !important; color: white !important; border: 1px solid #fff; font-size: 10px; }

        .share-mini { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 15px auto; width: 92%; max-width: 400px; }
        #sharePreview { font-size: 10px; color: #00d2ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: #111827; padding: 10px; border-radius: 4px; flex-grow: 1; border: 1px solid #334155; text-align: left; }
        .copy-btn { background: linear-gradient(90deg, #00d2ff, #0072ff); color: white; border: none; padding: 10px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; min-width: 80px; }
        
        .join-btn { width: 90%; max-width: 420px; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; display: block; margin: 10px auto; color: white; }
    </style>
</head>
<body>

    <div id="entry-popup">
        <div class="pop-box">
            <div class="support-text">SUPPORT US!</div>
            <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="pop-btn" style="background:#25D366;">JOIN WHATSAPP</a>
            <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="pop-btn" style="background:#0088cc;">JOIN TELEGRAM</a>
            <div style="margin-top:15px; cursor:pointer; font-size:11px; color:#64748b; text-decoration:underline;" onclick="closePopup()">CONTINUE TO STREAM</div>
        </div>
    </div>

    <header class="header"><h1>CRICKETLIVE! OFFICIAL</h1></header>

    <div class="video-wrapper">
        <div id="player-container">
            <div style="color: #64748b; padding-top: 20%; font-size: 13px;">Channel Select Karein...</div>
        </div>
    </div>

    <div class="channel-grid">
        <button class="channel-button wpl-btn" onclick="loadMatch('wpl_live')">🏏 WPL LIVE (NEW SERVER)</button>
        <button class="channel-button" onclick="loadMatch('ss1sdeng')">STAR SPORTS 1 SD</button>
        <button class="channel-button" onclick="loadMatch('ss1enghd')">SS 1 (ENG HD)</button>
        <button class="channel-button" onclick="loadMatch('ss2sd')">STAR SPORTS 2 SD</button>
        <button class="channel-button" onclick="loadMatch('ss2hd')">STAR SPORTS 2 HD</button>
        <button class="channel-button" onclick="loadMatch('ss1hindihd')">SS 1 (HINDI HD)</button>
        <button class="channel-button" onclick="loadMatch('ss2hindisd')">SS 2 (HINDI SD)</button>
        <button class="channel-button" onclick="loadMatch('ssselect2sd')">SS SELECT 2 SD</button>
        <button class="channel-button" onclick="loadMatch('ssselect2hd')">SS SELECT 2 HD</button>
        
        <button class="channel-button" onclick="loadMatch('tnt1')">TNT SPORTS 1</button>
        <button class="channel-button" onclick="loadMatch('willow')">WILLOW SPORTS</button>
        
        <button class="channel-button khel-btn" onclick="loadMatch('ss_khel')">📺 SS KHEL VHT</button>
        <button class="channel-button sa20-btn" onclick="loadMatch('sa20_live')">🔥 SA20 LIVE</button>
    </div>

    <div class="share-mini">
        <div id="sharePreview">Channel select karein...</div>
        <button class="copy-btn" id="copyBtn" onclick="copyShareMessage()">COPY LINK</button>
    </div>

    <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="join-btn" style="background:#25D366;">Join WhatsApp Group</a>
    <a href="https://t.me/TheCricketLIVEOfficial" target="_blank" class="join-btn" style="background:#0088cc;">Join Telegram Channel</a>

    <script>
        const channels = {
            'wpl_live': 'https://teamrohittry2.pages.dev/',
            'sa20_live': 'https://skcricweb.pages.dev/ipel?id=sa20',
            'ss1sdeng': 'https://cinearena.github.io/id/sports.html?id=Star1eng',
            'ss1enghd': 'https://cinearena.github.io/id/sports.html?id=Star1engHD',
            'ss2sd': 'https://cinearena.github.io/id/sports.html?id=Star2eng',
            'ss2hd': 'https://cinearena.github.io/id/sports.html?id=Star2engHD',
            'ss1hindihd': 'https://cinearena.github.io/id/sports.html?id=Star1HindiHD',
            'ss2hindisd': 'https://cinearena.github.io/id/sports.html?id=Star2HINDISD',
            'ssselect2sd': 'https://cinearena.github.io/id/sports.html?id=StarSportsSelect2',
            'ssselect2hd': 'https://cinearena.github.io/id/sports.html?id=StarSportsSelect2HD',
            'tnt1': 'https://cinearena.github.io/id/sports.html?id=TNTSports1',
            'willow': 'https://cinearena.github.io/id/sports.html?id=WillowSports',
            'ss_khel': 'https://cinearena.github.io/id/sports.html?id=Sports18Khel'
        };

        function loadMatch(slug) {
            const url = channels[slug];
            const container = document.getElementById('player-container');
            
            let cropClass = (slug === 'wpl_live' || slug === 'sa20_live') ? 'class="extreme-crop"' : '';

            container.innerHTML = `<iframe 
                id="main-player"
                ${cropClass}
                src="${url}" 
                sandbox="allow-scripts allow-same-origin allow-forms" 
                allow="autoplay; encrypted-media; fullscreen" 
                loading="lazy"></iframe>`;
            
            document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
        }

        function closePopup() { document.getElementById('entry-popup').style.display = 'none'; }
        function copyShareMessage() {
            const linkText = document.getElementById('sharePreview').innerText;
            if (linkText.includes("...")) return;
            navigator.clipboard.writeText(linkText);
            document.getElementById('copyBtn').innerText = "COPIED!";
            setTimeout(() => { document.getElementById('copyBtn').innerText = "COPY LINK"; }, 2000);
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const ch = urlParams.get('ch');
            if (ch && channels[ch]) loadMatch(ch);
        };
    </script>
</body>
</html>
