<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            background-color: #050810; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* --- PREMIUM HEADER --- */
        .site-header {
            padding: 20px 10px;
            background: radial-gradient(circle at top, #1e293b 0%, #050810 70%);
            border-bottom: 2px solid #1e293b;
            margin-bottom: 15px;
        }
        .site-header h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(18px, 5vw, 32px); 
            background: linear-gradient(90deg, #00d2ff 0%, #f9a8d4 50%, #00d2ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        /* --- VIDEO CONTAINER --- */
        .player-container { 
            position: relative; 
            width: 96%; 
            max-width: 850px; 
            margin: 10px auto; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden;
            border: 2px solid #1e293b;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* --- QUALITY BUTTONS --- */
        .quality-section-title {
            margin-top: 30px;
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 700;
        }

        .quality-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .quality-btn {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #00d2ff;
            padding: 15px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            cursor: pointer;
            text-decoration: none;
        }

        .hindi-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%) !important;
            color: white !important;
            grid-column: span 2;
        }

        .hd-tag {
            font-size: 10px;
            background: #ff416c;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        /* --- WHATSAPP POPUP --- */
        #wp-popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; /* Initially Flex to show on Page Load */
            justify-content: center; align-items: center;
            z-index: 999999;
            backdrop-filter: blur(10px);
        }
        .wp-popup-content {
            background: #0f172a; padding: 40px 30px; border-radius: 30px;
            width: 85%; max-width: 320px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: popupBounce 0.5s ease;
        }
        @keyframes popupBounce {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .wp-logo {
            width: 70px; height: 70px; background: #25D366; margin: 0 auto 20px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        .wp-logo svg { width: 40px; fill: white; }
        .join-btn {
            background: #25D366; color: white; text-decoration: none;
            display: block; padding: 18px; font-size: 18px; font-weight: 900;
            border-radius: 15px; margin-top: 20px;
        }
        .already-joined {
            margin-top: 25px; color: #94a3b8; font-size: 13px;
            font-weight: 700; cursor: pointer; text-decoration: underline;
        }

        #my-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050810; display: flex; justify-content: center; 
            align-items: center; z-index: 10;
        }
        .promo-btn {
            background: #22c55e; color: white; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: 900; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="wp-popup-overlay">
        <div class="wp-popup-content">
            <div class="wp-logo">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .018 5.393 0 12.029c0 2.12.554 4.189 1.602 6.006L0 24l6.135-1.61a11.83 11.83 0 005.912 1.569h.005c6.636 0 12.032-5.391 12.036-12.028a11.82 11.82 0 00-3.417-8.503z"/></svg>
            </div>
            <h2 style="margin:0;">Join WhatsApp</h2>
            <p style="font-size: 14px; color: #94a3b8; margin: 10px 0 20px 0;">Live Matches ke links ke liye hamara channel join karein!</p>
            <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="join-btn" onclick="goToLink()">JOIN & WATCH LIVE</a>
            <div class="already-joined" onclick="goToLink()">ALREADY JOINED</div>
        </div>
    </div>

    <header class="site-header">
        <h1>CricketLIVE! Official!</h1>
    </header>

    <div class="player-container">
        <div id="my-overlay">
            <button class="promo-btn" onclick="hideOverlay()">CLICK TO WATCH LIVE</button>
        </div>
        <iframe id="main-player" src="https://cinearena.github.io/id/sports.html?id=Sports18Khel" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="quality-section-title">Select Link To Watch</div>
    <div class="quality-container">
        <div onclick="showPopup('https://cinearena.github.io/id/sports.html?id=Sports18Khel')" class="quality-btn hindi-btn">
            SPORTS 18 KHEL - LIVE <span class="hd-tag">STABLE</span>
        </div>
        <div onclick="showPopup('https://cinearena.github.io/id/sports.html?id=Sports18Khel')" class="quality-btn">Server 1 (Auto)</div>
        <div onclick="showPopup('https://cinearena.github.io/id/sports.html?id=Sports18Khel')" class="quality-btn">Server 2 (HD) <span class="hd-tag">HD</span></div>
    </div>

    <script>
        let pendingLink = "";
        const popup = document.getElementById('wp-popup-overlay');

        // Function to show popup when link clicked
        function showPopup(url) {
            pendingLink = url;
            popup.style.display = 'flex';
        }

        // Function for popup buttons
        function goToLink() {
            popup.style.display = 'none';
            if (pendingLink !== "") {
                window.open(pendingLink, '_blank');
                pendingLink = ""; // Clear link
            }
        }

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
        }

        // Web open hote hi popup dikhane ke liye logic pehle se hi CSS/HTML mein 'display: flex' hai.
    </script>
</body>
</html>
