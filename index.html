<script>

        'in_ss1_hindi': 'https://allinonereborn.online/jio-plusede/a/new/player_india.html?id=174',
        'in_ss2_sd_hindi': 'https://allinonereborn.online/jio-plusede/a/new/player_india.html?id=1985',
        'in_ss2_hd_hindi': 'https://allinonereborn.online/jio-plusede/a/new/player_india.html?id=1984',
        'in_ss2_sd': 'https://allinonereborn.online/jio-plusede/a/new/player_india.html?id=1141',
        'cricbuzz_1': 'https://allinonereborn.online/mpd/willo.html',
        'cricbuzz_2': 'https://allinonereborn.online/mpd/willo.html',
        'prime_event': 'https://allinonereborn.online/mpd/prime1.html',
        'hub_sports': 'https://allinonereborn.xyz/mpd/hub-sports.html',
        'ss_select_1_hd': 'https://allinonereborn.online/jio-plusede/a/new/player_india.html?id=300',
        'ss2hd': 'https://insiderlivehd.pages.dev/Fox',
        'ss2hd_hindi': 'https://teamroiframe11.pages.dev/'
    };

    let currentChannel = null;
    let popupClosed = false;

    function loadMatch(slug) {
        currentChannel = slug;
        const container = document.getElementById('player-container');
        document.getElementById('loading-skeleton').style.display = 'block';
        
        let cropClass = 'class="fixed-controls"';
        
        // Special condition for Kick.com and GitHub pages to fit nicely
        if (slug === 'hotstar_kick' || slug === 'prime_live' || slug === 'sky_nz_4k') {
            container.innerHTML = `<iframe id="main-player" src="${channels[slug]}" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
        } else {
            if (slug === 'ss2hd' || slug === 'ss2hd_hindi') {
                cropClass = 'class="ss2-custom-crop"';
            }
            container.innerHTML = `<iframe id="main-player" ${cropClass} src="${channels[slug]}" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" scrolling="no" loading="lazy" fetchpriority="high" onload="hideSkeleton()"></iframe>`;
        }
        
        if(popupClosed) showUIParts();
        document.getElementById('watermark').style.display = 'inline-block';
        document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
    }

    function hideSkeleton() { document.getElementById('loading-skeleton').style.display = 'none'; }
    function showUIParts() { if (currentChannel && popupClosed) { document.getElementById('live-signal-box').style.display = 'flex'; document.getElementById('reaction-bar').style.display = 'flex'; } }
    function closePopup() { document.getElementById('entry-popup').style.display = 'none'; popupClosed = true; showUIParts(); }
    
    function react(emoji) { 
        const el = document.createElement('div'); 
        el.className = 'floating-emoji'; 
        el.innerHTML = emoji; 
        el.style.left = (40 + Math.random() * 20) + '%'; 
        document.body.appendChild(el); 
        setTimeout(() => el.remove(), 2000); 
    }
    
    function copyShareMessage() { const linkText = document.getElementById('sharePreview').innerText; navigator.clipboard.writeText(linkText); document.getElementById('copyBtn').innerText = "DONE!"; setTimeout(() => { document.getElementById('copyBtn').innerText = "COPY"; }, 2000); }
    function whatsappShare() { const linkText = document.getElementById('sharePreview').innerText; window.open("https://api.whatsapp.com/send?text=" + linkText, '_blank'); }

    window.onload = function() {
        const ch = new URLSearchParams(window.location.search).get('ch');
        if (ch && channels[ch]) {
            loadMatch(ch);
            document.getElementById('site-header').classList.add('hidden-mode');
            document.getElementById('share-header').style.display = 'block';
            document.getElementById('main-grid').classList.add('hidden-mode');
        }
    };
