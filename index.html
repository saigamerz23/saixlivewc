
<!DOCTYPE html>
<html>
<head>
  <title>CricketLIVE! Official</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0d1117;
      color: #ffffff;
      text-align: center;
      padding: 20px;
    }
    header {
      background-color: #00ffcc;
      color: #0d1117;
      padding: 10px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .score-box {
      border: 2px solid #00ffcc;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
      background-color: #1c1f26;
    }
    iframe {
      width: 90%;
      height: 200px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
    }
    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
