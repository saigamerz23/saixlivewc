<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050a18;
      background-image: linear-gradient(rgba(5, 10, 24, 0.92), rgba(5, 10, 24, 0.92)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover; background-position: center; background-attachment: fixed;
      font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
    }

    #loadingScreen {
      position: fixed; inset: 0; background: #050a18;
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
      transition: opacity 0.6s ease;
    }
    .loader-text { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #00ffff; letter-spacing: 5px; animation: pulseText 1.5s infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

    header {
      width: 92%; max-width: 420px; text-align: center; margin-top: 35px; padding: 18px 10px;
      background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
      border-radius: 15px; border: 1px solid rgba(191, 149, 63, 0.5); display: none;
    }
    .header-text-content { font-family: 'Orbitron', sans-serif; font-size: 1.35rem; font-weight: 700; color: #00ffff; }

    #playerContainer {
      position: relative; width: 95%; max-width: 800px; margin-top: 25px; border-radius: 12px; 
      overflow: hidden; border: 2px solid #00ffff; display: none; background: #000;
    }
    video { width: 100%; height: 100%; }

    .mini-badge {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      display: flex; align-items: center; gap: 5px; background: rgba(0, 0, 0, 0.6);
      padding: 4px 8px; border-radius: 50px; border: 1px solid rgba(0, 255, 255, 0.3);
    }
    .mini-badge span { font-size: 10px; color: #00ffff; font-weight: 700; font-family: 'Orbitron'; }

    #supportBox {
      display: none; width: 90%; max-width: 380px; background: rgba(10, 20, 40, 0.85);
      border-radius: 25px; padding: 30px; margin: 30px 0 120px 0; text-align: center;
    }
    .join-btn { background: #25D366; color: white; text-decoration: none; padding: 15px; border-radius: 12px; display: block; font-weight: bold; }

    .premium-ticker-wrap { width: 100%; background: rgba(3, 7, 18, 0.95); position: fixed; bottom: 0; padding: 12px 0; border-top: 1px solid #00ffff; }
    .ticker-content { display: flex; white-space: nowrap; animation: scroll 25s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="loader-text">CRICKETLIVE!</div>
  </div>

  <header id="headerBox">
    <div class="header-text-content">CRICKETLIVE! OFFICIAL</div>
  </header>

  <div id="playerContainer" data-shaka-player-container>
    <div class="mini-badge">
      <span>LIVE - WILLOW HD</span>
    </div>
    <video data-shaka-player id="video" autoplay poster="https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067"></video>
  </div>

  <div id="supportBox">
    <h2 style="color:#00ffff; margin-bottom:10px;">CricketLIVE! Official</h2>
    <p style="font-size:14px; margin-bottom:20px;">Join our channel for all match links!</p>
    <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" class="join-btn">JOIN WHATSAPP</a>
  </div>

  <div class="premium-ticker-wrap">
    <div class="ticker-content">
       <span style="color:#00ffff;">• Willow Cricket HD Stream Active • Use Settings icon for Quality • Join WhatsApp for more links •</span>
    </div>
  </div>

<script>
  // Proxy URL ka use kiya gaya hai CORS bypass karne ke liye
  const rawUrl = 'https://a201aivottlinear-a.akamaihd.net/OTTB/lhr-nitro/clients/dash/enc/f60kqesunw/out/v1/a435ed7a00f947deb4369b46d8f2fb70/cenc.mpd';
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);

  async function initApp() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getPlayer();

    ui.configure({ 'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'fullscreen'] });

    player.configure({
      drm: {
        clearKeys: { '1779c27b9d077a3ba0c9cc1bb9a94b9f': 'cc5cf3b7928fb9e0a1ee6a8b566f0a8e' }
      }
    });

    try {
      await player.load(proxyUrl);
    } catch (e) {
      console.error('Error loading stream', e);
      // Agar proxy fail ho to direct try karein
      player.load(rawUrl);
    }
  }

  document.addEventListener('shaka-ui-loaded', initApp);

  window.onload = function() {
    setTimeout(() => {
      document.getElementById('loadingScreen').style.opacity = "0";
      setTimeout(() => {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('headerBox').style.display = 'block';
        document.getElementById('playerContainer').style.display = 'block';
        document.getElementById('supportBox').style.display = 'block';
      }, 600);
    }, 3000);
  };
</script>
</body>
</html>
