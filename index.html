<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Official</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .header { padding: 15px; font-size: 22px; font-weight: bold; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
        
        .player-container { 
            position: relative; 
            width: 96%; max-width: 850px; margin: auto; aspect-ratio: 16/9; 
            background: #000; border: 2px solid #1e293b; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- PREMIUM WATERMARK COVER --- */
        .watermark-cover {
            position: absolute;
            /* Exact Position for Normal Mode */
            top: 12px; 
            left: 12px; 
            background: linear-gradient(135deg, #0f172a 0%, #000000 100%);
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 700;
            color: #38bdf8;
            border-radius: 6px;
            z-index: 2147483647;
            pointer-events: none;
            display: none;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.9), inset 0 0 10px rgba(56, 189, 248, 0.1);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* --- FULLSCREEN AUTOMATIC ADJUSTMENT --- */
        /* Jab video full screen hogi, ye CSS apne aap trigger hoga */
        :fullscreen .watermark-cover,
        :-webkit-full-screen .watermark-cover,
        :-ms-fullscreen .watermark-cover {
            top: 25px !important;
            left: 25px !important;
            font-size: 18px !important;
            padding: 8px 20px !important;
        }

        /* --- OVERLAY POPUP --- */
        #my-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999999;
        }

        .promo-btn {
            background: linear-gradient(to right, #22c55e, #16a34a);
            color: white; border: none;
            padding: 14px 30px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
            transition: 0.3s;
        }

        .promo-btn:active { transform: scale(0.95); }
        
        .close-text { font-size: 14px; color: #94a3b8; cursor: pointer; text-decoration: underline; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">Cricket Live Official</div>

    <div class="player-container" id="player-box">
        <div id="cover" class="watermark-cover">CricketLIVE! Official</div>

        <div id="my-overlay">
            <h2 style="margin-bottom:10px; color: #fff;">Premium Stream Ready</h2>
            <p style="color:#94a3b8; margin-bottom:25px;">Join our channel for backup links</p>
            <button class="promo-btn" onclick="openAndGo()">
                JOIN WHATSAPP & WATCH
            </button>
            <span class="close-text" onclick="hideOverlay()">Already Joined - Skip</span>
        </div>

        <iframe id="main-player" 
                src="" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('id') || "zeefhd"; 
        const player = document.getElementById('main-player');
        
        // Setting player source
        player.src = "https://momixtv.pages.dev/?id=" + vid;

        function openAndGo() {
            window.open('https://whatsapp.com/channel/AapkaLink', '_blank');
            hideOverlay();
        }

        function hideOverlay() {
            document.getElementById('my-overlay').style.display = 'none';
            document.getElementById('cover').style.display = 'block';
        }

        // Fullscreen fix for some Android browsers
        document.addEventListener('fullscreenchange', () => {
            const cover = document.getElementById('cover');
            if (document.fullscreenElement) {
                // Fullscreen mein z-index aur position ko force karna
                cover.style.zIndex = "2147483647";
            }
        });
    </script>

</body>
</html>
