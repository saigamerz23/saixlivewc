<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1e40;
      /* Premium Stadium Background */
      background-image: linear-gradient(rgba(10, 30, 64, 0.85), rgba(10, 30, 64, 0.85)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* Loading Screen */
    #loadingScreen {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      color: #00ffff;
      z-index: 1000;
    }

    /* Header - Force Single Line */
    header {
      width: 100%;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem; /* Adjusted for mobile width */
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 25px;
      white-space: nowrap; /* Yeh text ko ek hi line mein rakhega */
      padding: 0 10px;
    }

    /* Support Box */
    #supportBox {
      display: none;
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 25px;
      margin-top: 40px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .box-title {
      font-size: 1.8rem; /* "Support Us!" ko bada rakha gaya hai */
      font-weight: 700;
      color: #25D366;
      margin-bottom: 12px;
      display: block;
    }

    .box-desc {
      font-size: 0.9rem; /* Baki text thoda chota */
      color: #ccc;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* Join Button */
    .join-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      transition: 0.3s;
    }

    .join-btn:active {
      transform: scale(0.95);
    }

    .whatsapp-icon {
      width: 22px;
      fill: white;
    }
  </style>
</head>
<body>

  <div id="loadingScreen">LOADING...</div>

  <header id="headerText">CRICKETLIVE! OFFICIAL</header>

  <div id="supportBox">
    <span class="box-title">Support Us!</span>
    <p class="box-desc">
      Join our WhatsApp channel <strong>CricketLIVE! Official</strong><br> 
      For Instant Update & Exclusive Links.
    </p>
    <a href="https://whatsapp.com/channel/your-link" class="join-btn" target="_blank">
      <svg class="whatsapp-icon" viewBox="0 0 24 24">
        <path d="M20.52 3.48A11.69 11.69 0 0012 0C5.373 0 0 5.373 0 12a11.8 11.8 0 001.68 6.03L0 24l6.21-1.63A11.76 11.76 0 0012 24c6.627 0 12-5.373 12-12a11.6 11.6 0 00-3.48-8.52zM12 21.82c-2.21 0-4.27-.72-5.96-1.94l-.42-.27-3.69.97.99-3.6-.28-.37A9.94 9.94 0 012 12c0-5.51 4.49-10 10-10s10 4.49 10 10-4.49 10-10 10zm5.48-6.8l-1.6-.75a.62.62 0 00-.6.07c-.4.3-1.27.75-2.43-1.15a8.9 8.9 0 01-1.59-2.4c-.17-.39-.02-.6.13-.78.14-.15.32-.4.48-.6a.63.63 0 00.1-.6l-1.05-2.53a.32.32 0 00-.57-.1c-.2.2-.82.78-1.05 1.04-.35.4-.7.9-1.02 1.32a.43.43 0 00-.04.45c.14.24 1.95 3 4.7 4.2a8.35 8.35 0 002.63 1.02c.36.06.57.06.78-.1a1.05 1.05 0 00.38-.6c.13-.26.45-1.05.52-1.17a.27.27 0 00-.02-.3z"/>
      </svg>
      JOIN WHATSAPP CHANNEL
    </a>
  </div>

<script>
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('supportBox').style.display = 'block';
  }, 2500);
</script>

</body>
</html>
