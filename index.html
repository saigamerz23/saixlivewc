      color: #fff;

    }

    .title {
      font-size: 60px;
      font-weight: bold;
      background: linear-gradient(to right, #00bfff, #ff00cc);
      -webkit-background-clip: text;
      color: transparent;

    }

    .support-box {
      position: relative;

      border: 3px solid #25D366;

      margin-top: 40px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 20px #25D36655;
      animation: fadeIn 1.5s ease;
    }

    .support-box h2 {
      font-size: 26px;
      margin-bottom: 15px;
      color: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .support-box h2 img {
width: 26px;

    }

    }

    .join-btn {
      background: linear-gradient(135deg, #25D366, #128C7E);

      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .join-btn:hover {
      opacity: 0.92;
      transform: scale(1.05);
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 24px;
      color: #aaa;
      cursor: pointer;
    }

    .close-btn:hover {
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
