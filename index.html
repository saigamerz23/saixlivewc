<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CricketLIVE! Official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      z-index: 9999;
      color: transparent;
      background-image: linear-gradient(90deg, #FFD700, #FF8C00);
      background-clip: text;
      -webkit-background-clip: text;
    }

    .dots::after {
      content: '';
      display: inline-block;
      animation: dots 1.5s steps(3, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
66% { content: '..'; }
      100% { content: '...'; }
    }

    .container {
      display: none;
      text-align: center;
      padding: 80px 20px;
      height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 50px;
    }

    .whatsapp-logo {
      width: 48px;
      height: 48px;
      animation: pulse 1.8s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 #25D366); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 10px #25D366); }
    }

    .support-box {
      background: linear-gradient(145deg, #111, #1a1a1a);
      border: 3px solid #25D366;
      border-radius: 30px;
      padding: 60px 50px;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 0 40px #25D366cc;
      animation: fadeIn 1s ease-in-out;
      color: #eee;
    }

    .support-title {
      display: flex;
align-items: center;
      justify-content: center;
      font-size: 36px;
      background: linear-gradient(90deg, #25D366, #128C7E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      gap: 12px;
      margin-bottom: 25px;
    }

    .support-box p {
      font-size: 20px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .btn {
      padding: 18px 60px;
      font-size: 20px;
      font-weight: 700;
      border-radius: 35px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px #25D366aa;
    }

    .btn-join {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      border: none;
    }

    .btn-join:hover {
      box-shadow: 0 0 30px #25D366cc;
      transform: scale(1.05);
    }

    .btn-joined {
      background: #222;
      color: #bbb;
      border: 2px solid #666;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95);}
      to { opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>

  <div id="loader">LOADING<span class="dots"></span> PLEASE WAIT</div>

  <div class="container" id="mainContent">
    <div class="title">
<img class="whatsapp-logo" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" />
      CRICKETLIVE! OFFICIAL
    </div>

    <div class="support-box" id="supportBox">
      <div class="support-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="32" />
        Support Us!
      </div>
      <p>Join our <strong>WhatsApp channel - CricketLIVE! Official</strong> for instant updates and exclusive match links.</p>
      <div class="btn-group">
        <button class="btn btn-joined" onclick="hideSupport()">Already Joined</button>
        <a href="https://whatsapp.com/channel/0029Vb9sfuABA1eqJmiFc91q" target="_blank" class="btn btn-join">Join Now</a>
      </div>
    </div>
  </div>

  <script>
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'flex';
      }, 3000);
    }

    function hideSupport() {
      document.getElementById('supportBox').style.display = 'none';
    }
  </script>

</body>
</html>
