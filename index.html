    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { margin: 0; background-color: #050810; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding-bottom: 20px; overflow-x: hidden; }
        
        /* POPUP RESTORED */
        #entry-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 16, 0.95); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .pop-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .support-text { font-family: 'Bebas Neue', cursive; font-size: 32px; color: #00d2ff; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        .pop-btn { padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; color: white; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }

        /* SIDEBAR */
        .floating-sidebar { position: fixed; left: 10px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .sidebar-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; text-decoration: none; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }

        .header { padding: 15px 10px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        .header h1 { font-family: 'Orbitron', sans-serif; background: linear-gradient(90deg, #00d2ff, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; margin: 0; }

        /* VIDEO & PERFECT CROPS */
        .video-wrapper { width: 96%; max-width: 850px; margin: 20px auto; background: #000; border: 1px solid rgba(0, 210, 255, 0.5); border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; position: relative; }
        #main-player { width: 100%; height: 100%; border: 0; position: absolute; left: 0; z-index: 1; transform-origin: top center; }
        
        .standard-crop { height: 160% !important; top: -35% !important; transform: scale(1.05); }
        .fox-crop { height: 175% !important; top: -65% !important; transform: scale(1.02); }
        .prime-fix { height: 170% !important; top: -50% !important; transform: scale(1.05); }
        .no-crop { height: 100% !important; top: 0 !important; transform: scale(1) !important; }

        /* GRID SYSTEM */
        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; max-width: 94%; }
        .channel-button { border: none; padding: 12px 5px; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: white; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.3); }

        .btn-blue { background: linear-gradient(45deg, #00104b, #004e92) !important; grid-column: span 2; border: 1px solid #00d2ff !important; }
        .btn-red { background: linear-gradient(45deg, #600000, #b30000) !important; grid-column: span 2; border: 1px solid #fff !important; }
        .btn-cyan { background: linear-gradient(45deg, #00c6ff, #0072ff) !important; grid-column: span 2; }
        .btn-green { background: #1d976c !important; color: #000 !important; }

        #sharePreview { font-size: 10px; color: #00d2ff; background: rgba(17, 24, 39, 0.8); padding: 10px; border-radius: 4px; flex-grow: 1; text-align: left; overflow: hidden; }
        .copy-btn { background: #00d2ff; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; }
        
        .skeleton { width: 100%; height: 100%; background: #0f172a; position: absolute; top: 0; left: 0; z-index: 5; display: none; }
        #watermark { position: absolute; top: 8px; left: 8px; z-index: 10; font-size: 8px; color: #ffffff; background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 4px; display: none; }
    </style>
</head>

<script>

    };

    function loadMatch(slug) {
        const container = document.getElementById('player-container');
        document.getElementById('loading-skeleton').style.display = 'block';
        
        // PERFECT CROP LOGIC
        let crop = 'class="no-crop"';
        if (['ss2sd', 'ss2hd', 'fox_501', 'wpl_live', 'fox_cricket', 'hotstar_live'].includes(slug)) {
            crop = 'class="standard-crop"';
        } else if (['sa20_live', 'prime_live'].includes(slug)) {
            crop = 'class="prime-fix"';
        }

        container.innerHTML = `<iframe id="main-player" ${crop} src="${channels[slug]}" scrolling="no" allowfullscreen onload="document.getElementById('loading-skeleton').style.display='none'"></iframe>`;
        document.getElementById('watermark').style.display = 'block';
        document.getElementById('sharePreview').innerText = window.location.href.split('?')[0] + "?ch=" + slug;
    }

    function closePopup() { document.getElementById('entry-popup').style.display = 'none'; }
    function copyShareMessage() { navigator.clipboard.writeText(document.getElementById('sharePreview').innerText); alert('Link Copied!'); }
</script>
